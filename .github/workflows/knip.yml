name: Knip

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'
  workflow_dispatch:

concurrency:
  group: knip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knip:
    name: Detect unused code / dependencies (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7c453151 # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: bun install --frozen-lockfile

      - name: Run knip
        working-directory: ${{ matrix.workspace }}
        run: bun run knip --reporter compact
