name: Knip

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'
  workflow_dispatch:

concurrency:
  group: knip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knip:
    name: Detect unused code / dependencies (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: bun install --frozen-lockfile

      - name: Run knip
        working-directory: ${{ matrix.workspace }}
        run: bun run knip --reporter compact
