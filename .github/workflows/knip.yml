name: Knip

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/knip.yml'

concurrency:
  group: knip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knip:
    name: Detect unused code / dependencies (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: bun install --frozen-lockfile

      - name: Run knip (report only)
        working-directory: ${{ matrix.workspace }}
        # 初期導入時は既存コードに未使用 export が多数あるため、CI 失敗にはせず情報表示のみ。
        # 掃除が完了したらこのステップから `|| true` を外して赤検知に切り替える。
        run: bun run knip --reporter compact || true
