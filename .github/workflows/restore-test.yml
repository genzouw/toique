name: Restore Test

on:
  schedule:
    # 毎月1日 午前4時 (JST) = 前日19時 (UTC) に実行
    - cron: '0 19 1 * *'
  workflow_dispatch:

concurrency:
  group: restore-test
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || format('{0}-db-backups', vars.GCP_PROJECT_ID) }}

jobs:
  restore-test:
    name: Monthly restore verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique_restore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run restore test
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique_restore_test
        run: |
          chmod +x backup/restore-test.sh
          bash backup/restore-test.sh
