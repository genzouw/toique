name: Dependabot auto-merge

# Dependabot 自動マージは PR の write 権限が必要で、fork からの pull_request では
# secrets / write が付与されないため pull_request_target を使う必要がある。チェックアウト
# は行わず、信頼できる base (main) のコンテキストのみで実行する設計のため、外部 PR 由来の
# コード実行リスクは発生しない。抑制設定は .github/zizmor.yml で管理。
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # `github.actor` は spoof 可能 (push 元/コメント主によって変わる) と zizmor が指摘するため、
    # PR の payload に紐づき改竄できない `pull_request.user.login` でチェックする。
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      # マイナーバージョン、パッチバージョン、または開発用依存関係の場合に自動マージを有効化
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' || steps.metadata.outputs.dependency-type == 'direct:development' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
