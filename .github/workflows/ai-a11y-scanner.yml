name: AI Accessibility Scanner (a11y)

on:
  pull_request:
    paths:
      - 'frontend/src/**/*.tsx'
      - 'frontend/src/**/*.ts'
      - 'frontend/src/**/*.jsx'
      - 'frontend/src/**/*.js'
      - 'frontend/index.html'
    types: [opened, synchronize, reopened]

jobs:
  a11y_review:
    name: Automated A11y Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Use GitHub CLI to get PR diff
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO")
          # Limit diff to ~8000 lines to avoid blowing up the context window
          TRUNCATED_DIFF=$(echo "$DIFF" | head -n 8000)

          # Pass multiple lines to GITHUB_OUTPUT safely
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "diff<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Analyze A11y with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_FOR_MODELS: ${{ secrets.PAT_FOR_MODELS }}
          PR_DIFF: ${{ steps.get_diff.outputs.diff }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prNumber = parseInt(process.env.PR_NUMBER);

            if (!process.env.PAT_FOR_MODELS) {
              console.error("Missing PAT_FOR_MODELS secret. Cannot call GitHub Models API.");
              return;
            }

            if (!prDiff) {
              console.log("No diff found. Skipping review.");
              return;
            }

            const prompt = `
            あなたはWCAG (Web Content Accessibility Guidelines) やWAI-ARIAのベストプラクティスに精通したシニアフロントエンドエンジニアです。
            2025年の最新のアクセシビリティ基準に基づいて、以下のPull Requestの変更差分（diff）をレビューしてください。

            【レビューの観点】
            - \`<button>\` や \`<a>\` などのインタラクティブ要素に適切な \`aria-label\` またはテキストコンテンツが含まれているか。
            - カスタムUI（例：divで作られたプログレスバーなど）に適切な \`role\`（例：\`role="progressbar"\`）やARIA属性が付与されているか。
            - 状態の変化がスクリーンリーダーに伝わるよう、必要に応じて \`aria-live\` や \`role="status"\` が使われているか。
            - キーボード操作（フォーカスインジケータ：\`focus-visible\` など）が適切に設定されているか。
            - コントラスト比や、視覚情報のみに依存したUIになっていないか。

            【指示】
            指摘すべきアクセシビリティの懸念事項があれば、具体的な修正コードの提案を含めて日本語のMarkdown形式で回答してください。
            もし懸念事項が一つもなければ、「アクセシビリティ上の懸念事項は見当たりませんでした。👍」とだけ回答してください。

            【差分】
            \`\`\`diff
            ${prDiff}
            \`\`\`
            `;

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.PAT_FOR_MODELS}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert accessibility (a11y) engineer. Answer in Japanese." },
                  { role: "user", content: `<user_input>${prompt}</user_input>` }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }

            const analysis = data.choices[0].message.content;

            const commentBody = `🤖 **AI Accessibility Scanner (a11y)**\n\n${analysis}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
