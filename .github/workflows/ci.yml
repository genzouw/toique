name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'db/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend (lint / typecheck / format / test / build)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build and run checks in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend,ignore-error=true

  backend:
    name: Backend (lint / typecheck / format / build / test)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build ci-check image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Build ci-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: ci-test
          tags: toique-backend-test:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Run migrations
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest npx drizzle-kit migrate
      - name: Run tests with coverage
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest
