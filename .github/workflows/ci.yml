name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # dorny/paths-filter は User アカウント所有で Marketplace verified 扱いに
      # ならないため、本リポジトリの Actions ポリシー (selected + verified) では
      # patterns_allowed に "dorny/paths-filter@*" を明示許可している
      # (terraform: genzouw/genzouw.com)。差し替え時は同設定の更新も必要。
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'db/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'
            migrations:
              - 'db/migrations/**'
              - 'scripts/check-migrations.sh'
              - '.github/workflows/ci.yml'

  migrations-lint:
    name: Migrations (index ops safety lint)
    needs: changes
    # changes ジョブが failure になっても本ジョブは走らせる (フォールバックで全件実行)。
    # always() を挟まないと needs 失敗時に GitHub Actions の暗黙ガードで SKIPPED になる。
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.migrations == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint migration SQL (CREATE/DROP INDEX must be idempotent)
        run: bash scripts/check-migrations.sh

  frontend:
    name: Frontend (lint / typecheck / format / test / build)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and run checks in Docker
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: frontend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend,ignore-error=true

  frontend-e2e:
    # Issue #234 の対応方針 (2): プレビュー環境想定での主要画面巡回 + CSP 違反検知。
    # wrangler pages dev で `_headers` と Functions が本番同等に動作する環境を立てて、
    # Playwright (Chromium) で公開画面を巡回する。
    name: Frontend E2E (CSP smoke)
    needs: changes
    # changes ジョブが failure になっても本ジョブは走らせる (フォールバックで全件実行)。
    # always() を挟まないと needs 失敗時に GitHub Actions の暗黙ガードで SKIPPED になる。
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium
      - name: Run E2E (CSP smoke)
        working-directory: frontend
        env:
          # カスタムドメイン化に伴い、フロントエンドビルドに適用される静的 CSP ヘッダー
          # (public/_headers の connect-src に設定された https://api.toique.genzouw.com)
          # と一致する VITE_API_URL を指定し、E2E テスト時の CSP 違反エラーを回避する。
          # build は package.json の `pretest:e2e` フック (`bun run build`) 経由で実行される。
          VITE_API_URL: https://api.toique.genzouw.com
        run: bun run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  backend:
    name: Backend (lint / typecheck / format / build / test)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build ci-check image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Build ci-test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          target: ci-test
          tags: toique-backend-test:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Run migrations
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest bunx drizzle-kit migrate
      - name: Run tests with coverage
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest
