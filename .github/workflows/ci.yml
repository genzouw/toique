name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lockfile-sync:
    name: Lockfile sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check backend lockfile sync
        working-directory: backend
        run: npm ci --ignore-scripts
      - name: Check frontend lockfile sync
        working-directory: frontend
        run: npm ci --ignore-scripts

  frontend:
    name: Frontend (lint / typecheck / format / test / build)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Build and run checks in Docker
        run: docker build --target ci-check -f frontend/Dockerfile .

  backend:
    name: Backend (lint / typecheck / format / build / test)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Build and run checks in Docker
        run: docker build --target ci-check -f backend/Dockerfile .
      - name: Build test image
        run: docker build --target ci-test -t toique-backend-test -f backend/Dockerfile .
      - name: Run migrations
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test npx drizzle-kit migrate
      - name: Run tests with coverage
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test
