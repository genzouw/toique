# TODO: GitHub Actions 月間無料枠を使い切ったため一時的に無効化中。
# TODO: 2026-06-01 以降に無料枠がリセットされたタイミング、または当リポジトリが Public 化された時点でコメントを外し再有効化すること。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'db/**'
              - '.prettierrc'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend (lint / typecheck / format / test / build)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and run checks in Docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: frontend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend,ignore-error=true

  frontend-e2e:
    # Issue #234 の対応方針 (2): プレビュー環境想定での主要画面巡回 + CSP 違反検知。
    # wrangler pages dev で `_headers` と Functions が本番同等に動作する環境を立てて、
    # Playwright (Chromium) で公開画面を巡回する。
    name: Frontend E2E (CSP smoke)
    needs: changes
    # changes ジョブが failure になっても本ジョブは走らせる (フォールバックで全件実行)。
    # always() を挟まないと needs 失敗時に GitHub Actions の暗黙ガードで SKIPPED になる。
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium
      - name: Run E2E (CSP smoke)
        working-directory: frontend
        env:
          # ビルド時に CSP の __VITE_API_ORIGIN__ を解決する。テスト中はバックエンドへ
          # 接続しないため値は何でも良いが、CSP に乗ったプレースホルダ置換を確認する目的で
          # 本番デプロイ時と同じ形式 (https://) のダミーオリジンを与える。
          # build は package.json の `pretest:e2e` フック (`bun run build`) 経由で実行される。
          VITE_API_URL: https://api.test.invalid
        run: bun run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  backend:
    name: Backend (lint / typecheck / format / build / test)
    needs: changes
    if: needs.changes.result != 'success' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build ci-check image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: backend/Dockerfile
          target: ci-check
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Build ci-test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: backend/Dockerfile
          target: ci-test
          tags: toique-backend-test:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
      - name: Run migrations
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest bunx drizzle-kit migrate
      - name: Run tests with coverage
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test:latest
