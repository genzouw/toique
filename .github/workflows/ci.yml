name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint / typecheck / format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run checks in Docker
        run: docker build --target frontend-ci -f Dockerfile.ci .

  backend:
    name: Backend (lint / typecheck / format / test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: toique
          POSTGRES_PASSWORD: toique
          POSTGRES_DB: toique
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Build and run checks in Docker
        run: docker build --target backend-ci -f Dockerfile.ci .
      - name: Build test image
        run: docker build --target backend-test -t toique-backend-test -f Dockerfile.ci .
      - name: Run migrations
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test npx drizzle-kit migrate
      - name: Run tests with coverage
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgresql://toique:toique@localhost:5432/toique
          toique-backend-test
