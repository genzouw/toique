name: License Compliance

on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 08:00 JST (= 日曜 23:00 UTC) に実行
    - cron: '0 23 * * 0'
  workflow_dispatch:

concurrency:
  group: license-compliance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license_check:
    name: OSS License Compliance Check
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          cache: 'bun'

      - name: Install dependencies (Root)
        run: bun install --frozen-lockfile

      - name: Check Licenses (Root)
        run: bun x license-checker-rseidelsohn --failOn "GPL;AGPL" --summary

      - name: Install dependencies (Backend)
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Check Licenses (Backend)
        working-directory: backend
        run: bun x license-checker-rseidelsohn --failOn "GPL;AGPL" --summary

      - name: Install dependencies (Frontend)
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Check Licenses (Frontend)
        working-directory: frontend
        run: bun x license-checker-rseidelsohn --failOn "GPL;AGPL" --summary

      - name: Install dependencies (Infra)
        working-directory: infra
        run: bun install --frozen-lockfile

      - name: Check Licenses (Infra)
        working-directory: infra
        run: bun x license-checker-rseidelsohn --failOn "GPL;AGPL" --summary
