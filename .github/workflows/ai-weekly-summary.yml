name: AI Weekly Summary

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜日の00:00 UTC に実行
  workflow_dispatch: # 手動実行用

jobs:
  weekly_summary:
    name: Generate Weekly Summary
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Fetch week's data using GitHub CLI
        id: fetch_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_WEEK=$(date -d "7 days ago" +%Y-%m-%d)
          echo "Fetching PRs merged since $LAST_WEEK"
          PRS=$(gh pr list --state merged --search "merged:>=$LAST_WEEK" --json number,title,author --limit 50 || echo "[]")
          echo "Fetching Issues closed since $LAST_WEEK"
          ISSUES=$(gh issue list --state closed --search "closed:>=$LAST_WEEK" --json number,title,author --limit 50 || echo "[]")

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PRS_DATA<<$DELIMITER"
            echo "$PRS"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

          DELIMITER2=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "ISSUES_DATA<<$DELIMITER2"
            echo "$ISSUES"
            echo "$DELIMITER2"
          } >> "$GITHUB_ENV"

      - name: Generate and Post Summary with AI
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS_DATA: ${{ env.PRS_DATA }}
          ISSUES_DATA: ${{ env.ISSUES_DATA }}
        with:
          script: |
            if (!process.env.GITHUB_TOKEN) {
              console.log('GITHUB_TOKEN is not set. Skipping summary creation.');
              return;
            }

            const prompt = `
            以下のデータは、このプロジェクトにおいて過去1週間でマージされたPull Requestと、クローズされたIssueの一覧（JSON形式）です。
            これらを元に、今週の開発の進捗サマリーを作成してください。
            回答は必ず日本語で、プロフェッショナルで読みやすいMarkdown形式で出力してください。
            また、コントリビューター（PR作成者やIssue報告者）への感謝のメッセージを含めてください。

            【マージされた Pull Requests】
            ${process.env.PRS_DATA}

            【クローズされた Issues】
            ${process.env.ISSUES_DATA}
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  { role: "system", content: "You are a helpful AI assistant summarizing software development progress. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const summary = data.choices[0].message.content;

            const dateStr = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 開発週報サマリー (${dateStr})`,
              body: "🤖 **AIによる今週の開発サマリー:**\n\n" + summary
            });
