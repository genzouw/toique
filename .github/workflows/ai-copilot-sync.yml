name: AI Copilot Instructions Sync

on:
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行
  workflow_dispatch:

jobs:
  sync_copilot_instructions:
    name: Sync Copilot Instructions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run Repomix to pack the repository
        uses: yamadashy/repomix/.github/actions/repomix@9cfeac741dd6d788ea232f50c28c410d32120377 # v1.17.0
        with:
          output: repomix-output.xml
          compress: true
          ignore: "**/*.test.ts,**/*.spec.ts,**/dist/**,**/build/**,**/node_modules/**"

      - name: Generate Copilot Instructions with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_FOR_MODELS: ${{ secrets.PAT_FOR_MODELS }}
        with:
          script: |
            const fs = require('fs');
            let repoContext = '';
            try {
              repoContext = fs.readFileSync('repomix-output.xml', 'utf8');
            } catch (err) {
              console.error('Failed to read repomix-output.xml', err);
              return;
            }

            const MAX_LENGTH = 100000;
            if (repoContext.length > MAX_LENGTH) {
              repoContext = repoContext.substring(0, MAX_LENGTH) + '\n... (truncated due to length)';
            }

            const prompt = \`
            あなたはシニアソフトウェアエンジニアです。
            以下のリポジトリ全体のソースコード情報（XML形式）を分析し、GitHub Copilot 向けのカスタム指示書（Copilot Instructions）を作成してください。

            【リポジトリのコンテキスト】
            \\\`\\\`\\\`xml
            \${repoContext}
            \\\`\\\`\\\`

            以下の指示に従って Markdown 形式のドキュメントを作成してください：
            1. タイトルは含めず、直接ルールやコンテキストを箇条書きなどで記載してください。
            2. 使用している主要な言語、フレームワーク（Bun, Hono, React 19, Tailwind CSS 4など）、データベース（PostgreSQL, Drizzle ORM）のコーディング規約を明記してください。
            3. セキュリティ（環境変数の扱いや入力値のサニタイズ）とパフォーマンス（N+1問題の回避など）に関するベストプラクティスを含めてください。
            4. 回答は日本語で出力し、そのまま \\\`.github/copilot-instructions.md\\\` に保存できる内容にしてください。Markdown コードブロック（\\\`\\\`\\\`markdown ... \\\`\\\`\\\`）で囲まないでください。
            \`;

            console.log('Calling GitHub Models for Copilot Instructions Generation...');
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': \`Bearer \${process.env.PAT_FOR_MODELS}\`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert developer configuring AI assistants. Output ONLY the raw markdown content without any wrapping markdown code blocks (no \`\`\`markdown and no \`\`\` at the end). Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              console.error(\`GitHub Models API Error: status=\${response.status} body=\${err}\`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            let docContent = data.choices[0].message.content.trim();

            if (docContent.startsWith('\`\`\`markdown')) {
              docContent = docContent.substring('\`\`\`markdown'.length).trim();
              if (docContent.endsWith('\`\`\`')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            } else if (docContent.startsWith('\`\`\`')) {
              docContent = docContent.substring(3).trim();
              if (docContent.endsWith('\`\`\`')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            }

            const path = require('path');
            fs.mkdirSync('.github', { recursive: true });

            fs.writeFileSync('.github/copilot-instructions.md', docContent);
            console.log('Successfully wrote .github/copilot-instructions.md');

      - name: Create Pull Request with updated Copilot Instructions
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT_FOR_MODELS }}
          commit-message: 'chore: auto-update Copilot instructions via AI'
          title: 'chore: AIによるCopilot Instructionsの自動更新'
          body: '🤖 GitHub Models (o3-mini) によってソースコードから最新のCopilot用カスタム指示書が生成されました。確認してマージしてください。'
          branch: 'ai-copilot-instructions-update'
          base: 'main'
