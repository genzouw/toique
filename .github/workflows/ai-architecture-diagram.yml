name: AI Architecture Diagram Generator

on:
  schedule:
    - cron: '0 0 1 * *' # Run at 00:00 on the 1st of every month
  workflow_dispatch:

jobs:
  generate_architecture_diagram:
    name: Generate Architecture Diagram
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run Repomix to pack the repository
        uses: yamadashy/repomix/.github/actions/repomix@e98afd55061dce37dc6070fc98bb61218939fdf8 # v1.16.0
        with:
          output: repomix-output.xml
          compress: true
          # Exclude tests, docs, and build artifacts to keep context size manageable and focus on architecture
          ignore: "**/*.test.ts,**/*.spec.ts,**/dist/**,**/build/**,**/node_modules/**,docs/**,.github/**"

      - name: Generate Architecture Diagram with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_MODELS }}
        with:
          script: |
            const fs = require('fs');
            let repoContext = '';
            try {
              repoContext = fs.readFileSync('repomix-output.xml', 'utf8');
            } catch (err) {
              console.error('Failed to read repomix-output.xml', err);
              return;
            }

            // Truncate if too large, giving priority to the beginning (which often has project structure)
            const MAX_LENGTH = 100000;
            if (repoContext.length > MAX_LENGTH) {
              repoContext = repoContext.substring(0, MAX_LENGTH) + '\n... (truncated due to length)';
            }

            const prompt = `
            あなたはシニアソフトウェアアーキテクトです。
            以下のリポジトリ全体のソースコード情報（XML形式）を分析し、システムのアーキテクチャ図を Mermaid.js フォーマットで作成してください。
            また、アーキテクチャの概要や各コンポーネントの役割についての説明文も作成してください。

            【リポジトリのコンテキスト】
            \`\`\`xml
            ${repoContext}
            \`\`\`

            以下の指示に従って Markdown 形式のドキュメントを作成してください：
            1. タイトルは \`# ソフトウェアアーキテクチャ\` としてください。
            2. アーキテクチャの概要を簡潔に説明してください。
            3. Mermaid.js を用いてシステム全体の構成図 (C4 Model や System Context Diagram, または Component Diagram) を描画してください。
            4. 主要なコンポーネント (Frontend, Backend, Database, External APIs など) の役割を説明してください。
            5. データフローや主要な連携について記述してください。

            出力は、そのまま \`docs/architecture.md\` として保存できる完全な Markdown の内容にしてください。Markdown コードブロック（\`\`\`markdown ... \`\`\`）で囲まないで、直接 Markdown のテキストを出力してください。
            `;

            console.log('Calling GitHub Models for Architecture Diagram Generation...');
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.PAT_FOR_MODELS}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert software architect generating architecture documentation. Output ONLY the raw markdown content without any wrapping markdown code blocks (no ```markdown and no ``` at the end). Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              console.error(`GitHub Models API Error: status=${response.status} body=${err}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            let docContent = data.choices[0].message.content.trim();

            // 防御的: もしモデルが ```markdown で囲んで出力してきた場合は除去する
            if (docContent.startsWith('```markdown')) {
              docContent = docContent.substring('```markdown'.length).trim();
              if (docContent.endsWith('```')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            } else if (docContent.startsWith('```')) {
              docContent = docContent.substring(3).trim();
              if (docContent.endsWith('```')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            }

            // docs ディレクトリの存在確認と作成
            const path = require('path');
            fs.mkdirSync('docs', { recursive: true });

            // ファイルに書き出し
            fs.writeFileSync('docs/architecture.md', docContent);
            console.log('Successfully wrote docs/architecture.md');

      - name: Create Pull Request with generated Architecture Diagram
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/architecture.md

          if git diff --staged --quiet; then
            echo "No changes in architecture documentation."
            exit 0
          fi

          BRANCH_NAME="ai-architecture-update-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "docs: auto-generate architecture diagram via AI"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"

          gh pr create \
            --title "docs: AIによるアーキテクチャ図の自動更新" \
            --body "🤖 GitHub Models (o3-mini) によってソースコードから最新のアーキテクチャ図が生成されました。確認してマージしてください。" \
            --base main \
            --head "$BRANCH_NAME"
