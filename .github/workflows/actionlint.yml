name: actionlint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'
  workflow_dispatch:

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure shellcheck is available
        # ubuntu-latest には標準で shellcheck が含まれるが、明示インストールで
        # Runner image 差分による startup 系不整合を予防する
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Download actionlint
        id: actionlint
        run: |
          set -euo pipefail
          VERSION=1.7.12
          TARBALL="actionlint_${VERSION}_linux_amd64.tar.gz"
          # GitHub Releases の一時的な 5xx/接続断に備えてリトライを付与
          # （過去に 504 でジョブが落ちたためロバスト化）
          CURL_OPTS=(--retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 10 -fsSL)
          curl "${CURL_OPTS[@]}" -o "/tmp/${TARBALL}" "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${TARBALL}"
          curl "${CURL_OPTS[@]}" -o /tmp/checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_checksums.txt"
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp actionlint
          echo "executable=/tmp/actionlint" >> "$GITHUB_OUTPUT"

      - name: Run actionlint (with shellcheck integration)
        # `-shellcheck` で `run:` ブロックのシェル検査を厳格化し、
        # `paths`/`if` 等の構文ミスや誤った expression を起動前に弾く
        env:
          ACTIONLINT: ${{ steps.actionlint.outputs.executable }}
        run: |
          "$ACTIONLINT" \
            -color \
            -shellcheck="$(command -v shellcheck)"
