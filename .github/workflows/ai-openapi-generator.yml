name: AI OpenAPI Generator

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/routes/**'
      - 'backend/src/schema.ts'
  workflow_dispatch:

jobs:
  generate_openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '20'

      - name: Run Repomix to pack the backend codebase
        run: |
          npx repomix@1.16.0 --include "backend/src/routes/**/*.ts,backend/src/schema.ts" --output repomix-openapi-context.xml --compress

      - name: Generate OpenAPI Spec with GitHub Models
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PAT_FOR_MODELS: ${{ secrets.PAT_FOR_MODELS }}
        with:
          script: |
            const fs = require('fs');
            let repoContext = '';
            try {
              repoContext = fs.readFileSync('repomix-openapi-context.xml', 'utf8');
            } catch (err) {
              console.error('Failed to read repomix-openapi-context.xml', err);
              return;
            }

            const prompt = `
            あなたはシニアAPIエンジニアです。
            以下のリポジトリのバックエンドルーティングとデータベーススキーマ（XML形式）を分析し、完全な OpenAPI 3.0 仕様書を YAML 形式で作成または更新してください。

            【リポジトリのコンテキスト】
            \`\`\`xml
            ${repoContext}
            \`\`\`

            以下の指示に従って YAML ファイルの内容を作成してください：
            1. 出力はそのまま \`docs/openapi.yaml\` として保存できる完全な YAML の内容にしてください。
            2. YAML コードブロック（\`\`\`yaml ... \`\`\`）で囲まないで、直接 YAML テキストを出力してください。
            3. バックエンドの全てのルート、パスパラメータ、リクエストボディ、レスポンス（成功およびエラー）を網羅してください。
            4. データベーススキーマから適切なデータ型や必須/任意フィールドを推論して OpenAPI スキーマとして定義してください。
            `;

            console.log('Calling GitHub Models for OpenAPI Spec Generation...');
            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.PAT_FOR_MODELS}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert API engineer generating OpenAPI documentation. Output ONLY the raw YAML content without any wrapping markdown code blocks (no ```yaml and no ``` at the end). Answer in Japanese for descriptions where appropriate." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              console.error(`GitHub Models API Error: status=${response.status} body=${err}`);
              process.exit(1);
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              process.exit(1);
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              process.exit(1);
            }
            let docContent = data.choices[0].message.content.trim();

            if (docContent.startsWith('```yaml')) {
              docContent = docContent.substring('```yaml'.length).trim();
              if (docContent.endsWith('```')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            } else if (docContent.startsWith('```')) {
              docContent = docContent.substring(3).trim();
              if (docContent.endsWith('```')) {
                docContent = docContent.substring(0, docContent.length - 3).trim();
              }
            }

            const path = require('path');
            fs.mkdirSync('docs', { recursive: true });

            fs.writeFileSync('docs/openapi.yaml', docContent);
            console.log('Successfully wrote docs/openapi.yaml');

      - name: Create Pull Request with generated OpenAPI Spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-openapi-update"
          git checkout -B "$BRANCH_NAME"

          git add docs/openapi.yaml

          if git diff --staged --quiet; then
            echo "No changes in OpenAPI specification."
            exit 0
          fi

          git commit -m "docs: auto-generate OpenAPI spec via AI"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"

          # Check if PR exists
          if ! gh pr view "$BRANCH_NAME"; then
            gh pr create \
              --title "docs: AIによるOpenAPI仕様書の自動更新" \
              --body "🤖 GitHub Models (o3-mini) によってソースコードから最新のOpenAPI仕様書（\`docs/openapi.yaml\`）が生成・更新されました。確認してマージしてください。

              ※ **事前設定に関する注意点:**
              このワークフロー（AI OpenAPI Generator）を実行するには、リポジトリシークレットとして \`PAT_FOR_MODELS\` に GitHub Models API を呼び出せる Personal Access Token (PAT) を設定する必要があります。" \
              --base main \
              --head "$BRANCH_NAME"
          fi
