name: AI OpenAPI Generator

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/routes/**'
      - 'backend/src/schema.ts'
      - 'backend/src/index.ts'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate_openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Repomix
        # バージョンは zizmor (adhoc-packages) 対策として latest ではなく固定値を指定する。
        run: npm install --global repomix@1.16.0

      - name: Bundle backend with Repomix
        run: |
          repomix --include "backend/src/**/*.ts" --ignore "backend/src/**/*.test.ts" --output repomix-backend.xml

      - name: Generate OpenAPI with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PAT_FOR_MODELS: ${{ secrets.PAT_FOR_MODELS }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const repomixData = fs.readFileSync('repomix-backend.xml', 'utf8');
            let existingOpenAPI = "";
            try {
              existingOpenAPI = fs.readFileSync('docs/openapi.yaml', 'utf8');
            } catch (e) {
              console.log("No existing openapi.yaml found, generating new one.");
            }

            const prompt = `
            あなたはシニアAPIアーキテクトです。
            提供されたバックエンドのソースコード（Hono, Drizzle ORM）を解析し、OpenAPI 3.0.3 の YAML 仕様書を生成してください。

            【現在のバックエンドのコード】
            ${repomixData}

            【既存の openapi.yaml】
            ${existingOpenAPI}

            要件:
            - 出力は必ず YAML 形式の OpenAPI 3.0.3 仕様のみとしてください。
            - 既存の openapi.yaml がある場合は、それを最新のコードに合わせて更新・追記してください。
            - エンドポイントのパス、メソッド、リクエストボディ、レスポンススキーマを Zod スキーマ等から推測して詳細に記述してください。
            - Markdownのコードブロック（\`\`\`yaml ... \`\`\`）は出力に含めず、純粋な YAML 文字列のみを出力してください。
            - 日本語で分かりやすい summary や description を含めてください。
            `;

            console.log("Calling GitHub Models to generate OpenAPI spec...");

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.PAT_FOR_MODELS}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an OpenAPI expert. Output strictly valid YAML representing an OpenAPI 3.0 specification. Do not include markdown formatting or explanations." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const errText = await response.text();
              console.error(`GitHub Models API Error: status=${response.status} body=${errText}`);
              throw new Error("Failed to generate OpenAPI spec");
            }

            const data = await response.json();
            if (data.error || !data.choices || data.choices.length === 0) {
              throw new Error("Invalid response from GitHub Models");
            }

            let yamlResult = data.choices[0].message.content.trim();
            // Fallback: remove markdown block if present
            yamlResult = yamlResult.replace(/^```yaml\n?/, '').replace(/\n```$/, '');
            yamlResult = yamlResult.replace(/^```\n?/, '').replace(/\n```$/, '');

            fs.mkdirSync('docs', { recursive: true });
            fs.writeFileSync('docs/openapi.yaml', yamlResult);
            console.log("Successfully wrote docs/openapi.yaml");

      - name: Create Pull Request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-update OpenAPI spec based on recent backend changes"
          title: "docs: [AI] Auto-update OpenAPI specification"
          body: |
            バックエンドのコード変更を検知し、AI が自動的に `docs/openapi.yaml` を生成・更新しました。
            OpenAPI の仕様に間違いがないか確認してください。
          branch: "ai/openapi-update"
          base: main
          labels: "documentation, ai-generated"
