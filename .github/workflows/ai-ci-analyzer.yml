name: AI CI Failure Analyzer

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

jobs:
  analyze_failure:
    name: Analyze CI Failure
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get failing job logs
        id: get_logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          # Fetch jobs for the failed run
          JOBS_JSON=$(gh api /repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs)

          # Find the first failed job ID
          FAILED_JOB_ID=$(echo "$JOBS_JSON" | jq -r '.jobs[] | select(.conclusion == "failure") | .id' | head -n 1)

          if [ -z "$FAILED_JOB_ID" ]; then
            echo "No failed jobs found."
            echo "LOGS_FOUND=false" >> "$GITHUB_ENV"
          else
            echo "Found failed job: $FAILED_JOB_ID"

            # Fetch logs for the failed job
            LOGS=$(gh api "/repos/${{ github.repository }}/actions/jobs/${FAILED_JOB_ID}/logs" || echo "Could not fetch logs")

            # Tail the last 500 lines to fit into the prompt context
            TAILED_LOGS=$(echo "$LOGS" | tail -n 500)

            DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            {
              echo "FAILED_LOGS<<$DELIMITER"
              echo "$TAILED_LOGS"
              echo "$DELIMITER"
              echo "LOGS_FOUND=true"
            } >> "$GITHUB_ENV"
          fi

      - name: Find PR associated with the commit
        id: find_pr
        if: env.LOGS_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "No PR associated with this commit."
            echo "PR_FOUND=false" >> "$GITHUB_ENV"
          else
            echo "PR_FOUND=true" >> "$GITHUB_ENV"
            echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          fi

      - name: Analyze logs and post comment
        uses: actions/github-script@v7.0.1
        if: env.LOGS_FOUND == 'true' && env.PR_FOUND == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_LOGS: ${{ env.FAILED_LOGS }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
        with:
          script: |
            const failedLogs = process.env.FAILED_LOGS || '';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const runUrl = context.payload.workflow_run.html_url;

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のCI（GitHub Actions）の失敗ログを分析し、なぜジョブが失敗したのか原因を特定し、どのように修正すればよいかの具体的な提案を日本語で記述してください。
            回答は簡潔にまとめ、もし具体的なコードの修正案があれば提示してください。

            【CI 失敗ログ (末尾)】
            \`\`\`
            ${failedLogs}
            \`\`\`
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o',
                messages: [
                  { role: "system", content: "You are an expert software engineer helping debug CI failures. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }

            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }

            const analysis = data.choices[0].message.content;

            const commentBody = `🤖 **AI CI Failure Analyzer**\n\nCIの実行([Run #${context.payload.workflow_run.run_number}](${runUrl}))が失敗しました。AIによる原因分析と修正案は以下の通りです：\n\n${analysis}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
