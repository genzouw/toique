name: AI CI Failure Analyzer

# workflow_run は zizmor では dangerous-triggers として検知されるが、本ワークフローは
# 失敗した CI ログを取得して PR にコメントを書く読み取り/コメント用途で、デプロイや
# 書き込み権限のあるシークレットは扱わない。後続ステップでも head_sha 由来の任意コード
# 実行は行わず、`gh api` 経由のメタデータ取得と AI コメントのみで完結する。
# 抑制設定は .github/zizmor.yml で管理。
on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

jobs:
  analyze_failure:
    name: Analyze CI Failure
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get failing job logs
        id: get_logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          JOBS_JSON=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs")

          # Find the first failed job ID
          FAILED_JOB_ID=$(echo "$JOBS_JSON" | jq -r '.jobs[] | select(.conclusion == "failure") | .id' | head -n 1)

          if [ -z "$FAILED_JOB_ID" ]; then
            echo "No failed jobs found."
            echo "logs_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found failed job: $FAILED_JOB_ID"

            # Fetch logs for the failed job
            LOGS=$(gh api "/repos/${REPO}/actions/jobs/${FAILED_JOB_ID}/logs" || echo "Could not fetch logs")

            # Tail the last 500 lines to fit into the prompt context
            TAILED_LOGS=$(echo "$LOGS" | tail -n 500)

            DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            {
              echo "failed_logs<<$DELIMITER"
              echo "$TAILED_LOGS"
              echo "$DELIMITER"
              echo "logs_found=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Find PR associated with the commit
        id: find_pr
        if: steps.get_logs.outputs.logs_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh api "/repos/${REPO}/commits/${COMMIT_SHA}/pulls" --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "No PR associated with this commit."
            echo "pr_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "pr_found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze logs and post comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: steps.get_logs.outputs.logs_found == 'true' && steps.find_pr.outputs.pr_found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_LOGS: ${{ steps.get_logs.outputs.failed_logs }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        with:
          script: |
            const failedLogs = process.env.FAILED_LOGS || '';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const runUrl = context.payload.workflow_run.html_url;

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のCI（GitHub Actions）の失敗ログを分析し、なぜジョブが失敗したのか原因を特定し、どのように修正すればよいかの具体的な提案を日本語のMarkdown形式で記述してください。
            特に以下の観点に注意して分析してください：
            - パフォーマンスのボトルネック（O(N)ループ、N+1問題など）がテストのタイムアウトを引き起こしていないか
            - セキュリティ（認証、認可、APIキー等の漏洩）に関わるエラーではないか
            - UIやアクセシビリティ（aria-labelの欠落等）に関係するE2Eテストの失敗ではないか
            - 生成AI機能固有のプロンプト関連のエラーではないか

            回答は簡潔にまとめ、もし具体的なコードの修正案（スニペット）があれば提示してください。

            【CI 失敗ログ (末尾)】
            \`\`\`
            ${failedLogs}
            \`\`\`
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert software engineer helping debug CI failures. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }

            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }

            const analysis = data.choices[0].message.content;

            const commentBody = `🤖 **AI CI Failure Analyzer**\n\nCIの実行([Run #${context.payload.workflow_run.run_number}](${runUrl}))が失敗しました。AIによる原因分析と修正案は以下の通りです：\n\n${analysis}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
