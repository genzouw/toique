name: Secretlint

on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 07:00 JST (= 日曜 22:00 UTC) に実行
    - cron: '0 22 * * 0'
  workflow_dispatch:

concurrency:
  group: secretlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secretlint:
    name: Scan for leaked secrets (Secretlint)
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Secretlint
        run: bun run secretlint --format @secretlint/secretlint-formatter-sarif --output secretlint.sarif

      - name: Check Secretlint findings
        run: |
          findings=$(jq '[.runs[].results // []] | flatten | length' secretlint.sarif)
          if [ "$findings" -gt 0 ]; then
            echo "::error::Secretlint detected $findings finding(s). Fix the violations before merging."
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: secretlint.sarif
          category: secretlint
