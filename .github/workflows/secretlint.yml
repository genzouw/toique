name: Secretlint

on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 07:00 JST (= 日曜 22:00 UTC) に実行
    - cron: '0 22 * * 0'
  workflow_dispatch:

concurrency:
  group: secretlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secretlint:
    name: Scan for leaked secrets (Secretlint)
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Secretlint
        run: bun run secretlint
