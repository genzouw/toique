name: Secretlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 07:00 JST (= 日曜 22:00 UTC) に実行
    - cron: '0 22 * * 0'
  workflow_dispatch:

concurrency:
  group: secretlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secretlint:
    name: Scan for leaked secrets (Secretlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Secretlint
        run: bun run secretlint
