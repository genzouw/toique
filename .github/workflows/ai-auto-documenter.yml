name: AI Auto-Documenter

on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
    types: [opened, synchronize, reopened]

jobs:
  generate_docs:
    name: Auto-Generate JSDoc Comments
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Restrict the diff to TypeScript/TSX files using git directly so the
          # environment variable passed to the next step (and thus the node
          # process argv/envp size) never balloons with unrelated changes such
          # as large lockfile churn. Previously `gh pr diff` fetched the whole
          # PR diff, which could exceed the OS argument/environment size limit
          # and fail node startup with "Argument list too long".
          git fetch origin "$BASE_REF" --depth=1
          DIFF=$(git diff "origin/$BASE_REF...HEAD" -- '*.ts' '*.tsx')
          # Cap by bytes, not lines, since a single long line can still blow past ARG_MAX.
          TRUNCATED_DIFF=$(echo "$DIFF" | head -c 40000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "diff<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Auto-Document with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_FOR_MODELS: ${{ secrets.PAT_FOR_MODELS }}
          PR_DIFF: ${{ steps.get_diff.outputs.diff }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prNumber = parseInt(process.env.PR_NUMBER);

            if (!process.env.PAT_FOR_MODELS) {
              console.error("Missing PAT_FOR_MODELS secret. Cannot call GitHub Models API.");
              return;
            }

            if (!prDiff) {
              console.log("No diff found. Skipping review.");
              return;
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のPull Requestの変更差分（diff）を分析し、追加・変更されたTypeScript（またはTSX）の重要な関数、コンポーネント、またはクラスのうち、**JSDoc/TSDocコメントが欠落しているもの**を見つけてください。

            【指示】
            欠落しているものが見つかった場合、そのコードに対する適切なJSDoc（関数名、役割、引数 @param、戻り値 @returns の説明を含む）を日本語で提案してください。
            Markdown形式で、どのファイルのどの関数に対してどのようなJSDocを追加すべきかを具体的に記述してください。
            もしすべての重要な関数にすでにJSDocが記述されている場合、または追加・変更された関数がない場合は、「新しく追加・変更された関数には十分にドキュメントが記述されています。👍」とだけ回答してください。

            【差分】
            \`\`\`diff
            ${prDiff}
            \`\`\`
            `;

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.PAT_FOR_MODELS}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert developer specializing in code documentation and JSDoc/TSDoc. Answer in Japanese." },
                  { role: "user", content: `<user_input>${prompt}</user_input>` }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }

            const analysis = data.choices[0].message.content.trim();

            // Ignore if the AI determined everything is fine (using a heuristic check)
            if (analysis.includes('十分にドキュメントが記述されています') && analysis.length < 100) {
              console.log('No documentation required.');
              return;
            }

            const commentBody = `🤖 **AI Auto-Documenter (JSDoc/TSDoc)**\n\n${analysis}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
