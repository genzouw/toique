name: AI PR Auto-Approve Policy Checker

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai_approve:
    name: Automated PR Approval Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$DIFF" | head -c 10000)
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Code Review with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') return;
            const prompt = `以下のPR差分を分析し、変更内容が「ドキュメントの修正のみ」または「UIスタイルの微修正（機能的影響なし）」などの安全な変更であるか判定してください。安全な変更のみであれば "APPROVE"、そうでない場合は "REJECT" のみを出力してください。\n\n\`\`\`diff\n${prDiff}\n\`\`\``;
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [{ role: "user", content: prompt }]
              })
            });
            if (!response.ok) return;
            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content?.trim() || '';
            if (reply.includes("APPROVE") && !reply.includes("REJECT")) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: '🤖 **AI Auto-Approve:** このPRはドキュメントまたは軽微なスタイル変更と判定されたため、自動的に承認されました。'
              });
            }
