name: TruffleHog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 06:00 JST (= 日曜 21:00 UTC) に履歴全体を再スキャン
    - cron: '0 21 * * 0'
  workflow_dispatch:

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: Scan for leaked secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          # schedule時は全履歴スキャン(base指定なし)、push時は直前コミット(event.before)、PR時はターゲットブランチとの差分を対象とする。
          base: ${{ github.event_name == 'push' && github.event.before || github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.sha }}
          extra_args: --debug --only-verified
