name: AI Dependabot Analyzer

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  analyze_dependabot:
    name: Analyze Dependabot PR
    # DependabotからのPRのみ実行
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Search Dependencies
        run: pip install "tavily-python>=0.3.3" "duckduckgo-search>=6.0.0" --break-system-packages

      - name: Search Web (RAG prep)
        id: search_web
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          import os
          import base64
          import time

          title = os.environ.get('PR_TITLE', '')
          query = f"{title} (breaking changes OR vulnerability OR known issues)"

          search_res = ""
          tavily_api_key = os.environ.get('TAVILY_API_KEY', '').strip()

          if tavily_api_key:
              try:
                  from tavily import TavilyClient
                  tavily_client = TavilyClient(api_key=tavily_api_key)
                  response = tavily_client.search(query=query, search_depth="basic", max_results=5)
                  results = response.get('results', [])
                  if results:
                      search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('url')}\nSnippet: {r.get('content')}" for r in results])
              except Exception as e:
                  print(f"Tavily search failed: {e}. Falling back to DuckDuckGo.")

          if not search_res:
              try:
                  from duckduckgo_search import DDGS
                  with DDGS() as ddgs:
                      for _ in range(3):
                          try:
                              results = list(ddgs.text(query, max_results=5))
                              if results:
                                  search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])
                                  break
                          except Exception as inner_e:
                              time.sleep(2)
                              continue
              except Exception as e:
                  print(f"DuckDuckGo search failed: {e}")

          if not search_res:
              search_res = "No relevant Web search results found."

          delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"WEB_SEARCH_RESULTS<<{delimiter}\n")
              f.write(f"{search_res}\n")
              f.write(f"{delimiter}\n")
        shell: python

      - name: Analyze Dependabot Update with GitHub Models
        uses: actions/github-script@v7.0.1
        env:
          # Dependabotワークフローではsecrets.GITHUB_TOKENは権限不足のため、専用のPATを使用する
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_MODELS }}
          WEB_SEARCH_RESULTS: ${{ env.WEB_SEARCH_RESULTS }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const prTitle = process.env.PR_TITLE || '';
            const prBody = process.env.PR_BODY || '';
            const searchResults = process.env.WEB_SEARCH_RESULTS || '';

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のDependabotのPull Request（依存関係のアップデート）を分析し、
            Web検索から得られた最新情報をもとに、このアップデートによる「破壊的変更（Breaking Changes）」や「既知の脆弱性・不具合（Known Issues）」がないか調査・報告してください。
            回答は必ず日本語で、Markdown形式で分かりやすく出力してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【Pull Requestの説明】
            ${prBody}

            【Web検索結果 (RAG用の最新技術情報・脆弱性情報参考)】
            ${searchResults}

            特に影響がないと思われる場合は、「特に問題は見当たりません」と安心できるようなコメントを返してください。
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  { role: "system", content: "You are an expert software engineer analyzing dependency updates. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const analysisComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI Dependabot Analyzer (GitHub Models):**\n\n" + analysisComment
            });
