name: AI Dependabot Risk Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  analyze_dependabot_pr:
    name: Analyze Dependabot Risk
    runs-on: ubuntu-latest
    # `github.actor` は再実行時に他ユーザに変わりうるため、PR 作成者を直接参照する
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ai-dependabot-analyzer-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build Search Query
        id: build_query
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE="${PR_TITLE}"
          # Try to extract package name from typical dependabot titles like "Bump <package> from X to Y"
          PACKAGE_NAME=""
          if [[ "$TITLE" =~ Bump\ ([^[:space:]]+)\ from ]]; then
            PACKAGE_NAME="${BASH_REMATCH[1]}"
          else
            PACKAGE_NAME="$TITLE"
          fi
          echo "query=${PACKAGE_NAME} (issue OR breaking change OR vulnerability OR bug) (site:zenn.dev OR site:qiita.com OR site:github.com)" >> "$GITHUB_OUTPUT"

      - name: Search for package issues via Tavily or DuckDuckGo (RAG prep)
        id: search_web
        uses: ./.github/actions/ai-web-search
        with:
          search_query: ${{ steps.build_query.outputs.query }}
          tavily_api_key: ${{ secrets.TAVILY_API_KEY }}
          max_results: '5'

      - name: Analyze Risk with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_MODELS }}
          WEB_SEARCH_RESULTS: ${{ steps.search_web.outputs.search_results }}
        with:
          script: |
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';
            const searchResults = process.env.WEB_SEARCH_RESULTS || '';

            const prompt = `
            あなたはシニアソフトウェアエンジニアであり、依存関係の更新（DependabotのPull Request）に対するリスク分析を行います。
            回答は必ず日本語で、Markdown形式で出力してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【Pull Requestの説明（Release notes, Changelog 等）】
            ${prBody}

            【Web検索結果 (RAG用の最新技術情報・脆弱性情報・既知の不具合参考)】
            ${searchResults}

            以下の観点からリスクと影響範囲を分析し、マージするにあたっての推奨事項や注意点（破壊的変更がないかなど）を提示してください：
            - バージョンアップによる破壊的変更（Breaking Changes）の有無やリスク
            - Web検索結果から得られる既知の不具合や脆弱性情報
            - 当リポジトリにおける動作への潜在的な影響
            - 自動マージすべきか、あるいは手動での検証が必要かどうかの推奨

            回答は簡潔かつ具体的に記述してください。
            `;

            console.log("Calling GitHub Models for Dependabot Risk Analysis...");
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                messages: [
                  { role: "developer", content: "You are an expert software engineer analyzing dependency update risks. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const analysisComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI 依存関係リスク分析 (GitHub Models):**\n\n" + analysisComment
            });
