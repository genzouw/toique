name: AI PR Summarizer

on:
  pull_request:
    types: [closed]

jobs:
  summarize_merged_pr:
    name: Generate Post-Merge PR Summary
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ai-pr-summary-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR Information
        id: get_pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch PR diff
          PR_DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$PR_DIFF" | head -c 15000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Generate PR Summary with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';

            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') {
              console.log('No valid diff to review. Skipping.');
              return;
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            マージされた以下のPull Requestのコードの差分と説明を分析し、マージ後の記録のための構造化された要約（PR Summary）を作成してください。
            この要約は後から他の開発者がこのPRの内容や影響範囲を素早く理解できるようにするためのものです。

            回答は必ず日本語で、以下の構成に沿ったMarkdown形式で出力してください：
            - **Scope (変更範囲)**: どの機能やモジュールが変更されたか
            - **Impact (影響)**: パフォーマンス、セキュリティ、アクセシビリティなどに対する影響や特筆すべき点
            - **Key Changes (主要な変更点)**: 箇条書きで具体的に

            【Pull Requestのタイトル】
            ${prTitle}

            【現在のPull Requestの説明】
            ${prBody}

            【コードの差分 (一部切り詰められている可能性があります)】
            \`\`\`diff
            ${prDiff}
            \`\`\`
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert software engineer generating pull request summaries. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const reviewComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "📦 **AI PR Summarizer (Post-Merge):**\n\nこのPRは無事にマージされました。後日の振り返りのための要約を残します。\n\n" + reviewComment
            });
