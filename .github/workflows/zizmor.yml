name: zizmor

# 本ワークフローは genzouw/ci-workflows の reusable workflow を呼び出す薄いスタブ。
# ロジックの実体・変更は ci-workflows 側で一元管理する (トリガー定義のみここで持つ)。
# 参照 SHA の更新は Dependabot (github-actions ecosystem) が自動で PR を出す。
# 必須チェック (context: "zizmor / zizmor") のため paths フィルタ禁止。
on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 03:00 JST (= 日曜 18:00 UTC) に再スキャンして新規リスクを拾う
    - cron: '0 18 * * 0'
  workflow_dispatch:

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  zizmor:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    uses: genzouw/ci-workflows/.github/workflows/zizmor.yml@28d2b9b6f563eb1126e786f28e308390b2558a47 # v1.0.1
