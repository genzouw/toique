name: AI Threat Modeling

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  threat_modeling:
    name: STRIDE Threat Modeling
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ai-threat-modeling-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$DIFF" | head -c 15000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: STRIDE Threat Modeling with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';

            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') {
              console.log('No valid diff to review. Skipping.');
              return;
            }

            const prompt = `
            あなたはセキュリティ専門のシニアソフトウェアエンジニアです。以下のPull Requestの変更内容に対して、STRIDE脅威モデル（Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege）に基づいたセキュリティ脅威モデリング分析を実施してください。
            結果は必ず日本語で、Markdown形式で出力し、具体的なコードの修正案や緩和策を提案してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【Pull Requestの説明】
            ${prBody}

            【コードの差分 (一部切り詰められている可能性があります)】
            \`\`\`diff
            ${prDiff}
            \`\`\`

            以下の観点から徹底的に脅威分析を行ってください：
            1. なりすまし (Spoofing): 認証やセッション管理に不備はないか。
            2. 改ざん (Tampering): データの検証不足、インジェクション（SQL, XSS, プロンプトインジェクション等）はないか。
            3. 否認 (Repudiation): ログの記録漏れ、操作の追跡不能性はないか（特に本番環境でconsole.infoではなくconsole.logを使っていないか等）。
            4. 情報漏洩 (Information Disclosure): APIキー、認証情報、機密データのログ漏洩や露出はないか。
            5. サービス拒否 (Denial of Service): パフォーマンスの懸念（O(N)ループの悪用、N+1問題、不要な高負荷処理など）はないか。
            6. 権限昇格 (Elevation of Privilege): 認可チェックの不備や、テナント境界（tenant_id等）の絞り込み漏れはないか。

            また、生成AI活用特有の脆弱性（LLMに入力されるコンテキストのサニタイズ漏れなど）があれば併せて指摘してください。
            差分に大きなセキュリティ上の懸念が見当たらない場合は、その旨を肯定的に伝えてください。
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert security engineer performing STRIDE threat modeling. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const reviewComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🛡️ **AI 脅威モデリング (STRIDE / GitHub Models):**\n\n" + reviewComment
            });
