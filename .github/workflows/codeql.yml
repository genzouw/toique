name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 1' # 毎週月曜 10:30 JST (01:30 UTC) にスキャン

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # リポジトリのチェックアウトに必要
  security-events: write # CodeQL解析結果（SARIF）のアップロードに必要

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
      with:
        languages: ${{ matrix.language }}
        # クエリセットを指定してセキュリティ・品質チェックを強化可能
        # queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
      with:
        category: "/language:${{matrix.language}}"
