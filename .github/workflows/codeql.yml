name: 'CodeQL'

on:
  push:
    branches: ['main']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['main']
  schedule:
    - cron: '30 1 * * 1' # 毎週月曜 10:30 JST (01:30 UTC) にスキャン
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # リポジトリのチェックアウトに必要
  security-events: write # CodeQL解析結果（SARIF）のアップロードに必要

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          # JavaScript/TypeScript は CodeQL 2.25+ では autobuild モード非対応。none のみが有効。
          - language: javascript-typescript
            build-mode: none
          # actions 言語のスキャンを追加することで、ワークフロー定義 (.github/workflows/*.yml) に対する
          # CodeQL ルール (例: actions/missing-workflow-permissions) を継続的に評価できるようにする。
          # actions はソースコードビルドを必要としないため build-mode は none 固定。
          - language: actions
            build-mode: none

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality は security-extended を包含する最も包括的なスイート
          queries: security-and-quality
          # リポジトリ固有の false positive を suppress するための設定ファイル。
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: '/language:${{matrix.language}}'
