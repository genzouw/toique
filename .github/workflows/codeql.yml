name: 'CodeQL'

on:
  push:
    branches: ['main']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['main']
  schedule:
    - cron: '30 1 * * 1' # 毎週月曜 10:30 JST (01:30 UTC) にスキャン
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # リポジトリのチェックアウトに必要
  security-events: write # CodeQL解析結果（SARIF）のアップロードに必要

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          # JavaScript/TypeScript は CodeQL 2.25+ では autobuild モード非対応。none のみが有効。
          - language: javascript-typescript
            build-mode: none
          # actions 言語のスキャンを追加することで、ワークフロー定義 (.github/workflows/*.yml) に対する
          # CodeQL ルール (例: actions/missing-workflow-permissions) を継続的に評価できるようにする。
          # actions はソースコードビルドを必要としないため build-mode は none 固定。
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # クエリセットを指定してセキュリティ・品質チェックを強化可能
          # queries: security-extended,security-and-quality
          # リポジトリ固有の false positive を suppress するための設定ファイル。
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: '/language:${{matrix.language}}'
