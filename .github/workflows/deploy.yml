name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: toique-app-prod
  GCP_PROJECT_NUMBER: '800954033936'
  GCP_REGION: asia-northeast1
  CLOUD_RUN_SERVICE: toique-backend
  ARTIFACT_REPO: toique

jobs:
  deploy-backend:
    name: Backend (Cloud Run)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/800954033936/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@toique-app-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - name: Resolve backend image tag
        run: |
          echo "IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          target: production
          tags: ${{ env.IMAGE }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Run database migrations
        working-directory: backend
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=DATABASE_URL --project=${{ env.GCP_PROJECT_ID }})"
          export DATABASE_URL
          bun install --frozen-lockfile
          bunx drizzle-kit migrate

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --min-instances=0
            --max-instances=3
            --concurrency=80
            --cpu=1
            --memory=512Mi
            --allow-unauthenticated
            --port=8080
          env_vars: |
            NODE_ENV=production
            CORS_ORIGIN=https://toique.genzouw.com,https://toique.pages.dev
            STRIPE_PRO_PRICE_ID=price_1TPYvGIlm7LOZC27c1gsQ7q7
            MAIL_DRIVER=resend
            MAIL_FROM=Toique <noreply@toique.genzouw.com>
            CONTACT_FROM=Toique <noreply@toique.genzouw.com>
            OPERATOR_EMAILS=genzouw@gmail.com
            ADMIN_USERNAME=admin
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            ADMIN_PASSWORD=ADMIN_PASSWORD:latest

      - name: Set BETTER_AUTH_URL to deployed Cloud Run URL
        run: |
          gcloud run services update ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --update-env-vars "BETTER_AUTH_URL=${{ steps.deploy.outputs.url }}"

  deploy-backup:
    name: Backup Job (Cloud Run Jobs)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/800954033936/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@toique-app-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - name: Resolve backup image tag
        run: |
          echo "IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backup:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push backup image
        uses: docker/build-push-action@v7
        with:
          context: ./backup
          file: backup/Dockerfile
          tags: ${{ env.IMAGE }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup,ignore-error=true

      - name: Deploy Cloud Run Job with new image
        run: |
          gcloud run jobs deploy db-backup \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --image="$IMAGE"

  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    needs: deploy-backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.service_url }}
          VITE_GA_TRACKING_ID: ${{ vars.VITE_GA_TRACKING_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name toique --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message="Deploy ${{ github.sha }}"
