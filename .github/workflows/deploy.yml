# TODO: GitHub Actions 月間無料枠を使い切ったため一時的に無効化中。
# TODO: 2026-06-01 以降に無料枠がリセットされたタイミング、または当リポジトリが Public 化された時点でコメントを外し再有効化すること。
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'toique-backend' }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'toique' }}
  CLOUD_RUN_JOB_BACKUP: ${{ vars.CLOUD_RUN_JOB_BACKUP || 'db-backup' }}
  CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'toique' }}

jobs:
  deploy-backend:
    name: Backend (Cloud Run)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate required repository variables and secrets
        env:
          # 公開 OK な値は Variables、個人情報や管理 UI 識別子は Secrets に分けて格納。
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          STRIPE_PRO_PRICE_ID: ${{ vars.STRIPE_PRO_PRICE_ID }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          CONTACT_FROM: ${{ vars.CONTACT_FROM }}
          OPERATOR_EMAILS: ${{ secrets.OPERATOR_EMAILS }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
        run: |
          missing=0
          # GCP インフラ系 + Cloud Run に渡すアプリケーション値の両方を validate する。
          # 後者が空文字でデプロイされると、本番でランタイム挙動が壊れる (CORS 開放、
          # Stripe 404、admin 永久 403 等) ため、デプロイ前に fail fast する。
          for v in GCP_PROJECT_ID GCP_PROJECT_NUMBER GCP_SERVICE_ACCOUNT \
                   CORS_ORIGIN STRIPE_PRO_PRICE_ID MAIL_FROM CONTACT_FROM \
                   OPERATOR_EMAILS ADMIN_USERNAME; do
            if [ -z "${!v}" ]; then
              echo "::error::Required variable/secret '$v' is not set. Define it in Settings → Secrets and variables → Actions before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve backend image tag
        run: |
          echo "IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: backend/Dockerfile
          target: production
          tags: ${{ env.IMAGE }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Run database migrations
        working-directory: backend
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=DATABASE_URL --project=${{ env.GCP_PROJECT_ID }})"
          export DATABASE_URL
          bun install --frozen-lockfile
          bunx drizzle-kit migrate

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --min-instances=0
            --max-instances=3
            --concurrency=80
            --cpu=1
            --memory=512Mi
            --allow-unauthenticated
            --port=8080
          env_vars: |
            NODE_ENV=production
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            STRIPE_PRO_PRICE_ID=${{ vars.STRIPE_PRO_PRICE_ID }}
            MAIL_DRIVER=resend
            MAIL_FROM=${{ vars.MAIL_FROM }}
            CONTACT_FROM=${{ vars.CONTACT_FROM }}
            OPERATOR_EMAILS=${{ secrets.OPERATOR_EMAILS }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            DOGFOODING_EMAILS=${{ secrets.DOGFOODING_EMAILS }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            ADMIN_PASSWORD=ADMIN_PASSWORD:latest

      - name: Set BETTER_AUTH_URL to deployed Cloud Run URL
        run: |
          gcloud run services update ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --update-env-vars "BETTER_AUTH_URL=${{ steps.deploy.outputs.url }}"

  deploy-backup:
    name: Backup Job (Cloud Run Jobs)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate required repository variables
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for v in GCP_PROJECT_ID GCP_PROJECT_NUMBER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository variable '$v' is not set. Define it in Settings → Actions → Variables before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve backup image tag
        run: |
          echo "IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backup:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push backup image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./backup
          file: backup/Dockerfile
          tags: ${{ env.IMAGE }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup,ignore-error=true

      - name: Deploy Cloud Run Job with new image
        run: |
          gcloud run jobs deploy "${{ env.CLOUD_RUN_JOB_BACKUP }}" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --image="$IMAGE"

  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    needs: deploy-backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Validate required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for v in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository secret '$v' is not set. Define it in Settings → Secrets and variables → Actions before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.service_url }}
          VITE_GA_TRACKING_ID: ${{ vars.VITE_GA_TRACKING_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name ${{ env.CF_PAGES_PROJECT }} --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message="Deploy ${{ github.sha }}"
