name: Deploy

# workflow_run は zizmor では dangerous-triggers として検知されるが、本ワークフローは
# branches: [main] 限定で CI 成功後にのみ動作させる設計 (CI の品質ゲートを経た main の
# 内容だけが Cloud Run / Cloudflare Pages にデプロイされる) のため、信頼できないコード
# 由来の実行は発生しない。抑制設定は .github/zizmor.yml で管理。
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# CodeQL actions/missing-workflow-permissions (#1) 対応。
# ワークフロー全体で GITHUB_TOKEN を最小権限 (contents: read) に固定し、
# 個別ジョブでさらに必要な権限 (id-token: write など) を追記する構成にする。
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'toique-backend' }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'toique' }}
  CLOUD_RUN_JOB_BACKUP: ${{ vars.CLOUD_RUN_JOB_BACKUP || 'db-backup' }}
  CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'toique' }}
  API_DOMAIN: ${{ vars.API_DOMAIN || 'api.toique.genzouw.com' }}

jobs:
  deploy-backend:
    name: Backend (Cloud Run)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7c453151 # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate required repository variables and secrets
        env:
          # 公開 OK な値は Variables、個人情報や管理 UI 識別子は Secrets に分けて格納。
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          STRIPE_PRO_PRICE_ID: ${{ vars.STRIPE_PRO_PRICE_ID }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          CONTACT_FROM: ${{ vars.CONTACT_FROM }}
          OPERATOR_EMAILS: ${{ secrets.OPERATOR_EMAILS }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
        run: |
          missing=0
          # GCP インフラ系 + Cloud Run に渡すアプリケーション値の両方を validate する。
          # 後者が空文字でデプロイされると、本番でランタイム挙動が壊れる (CORS 開放、
          # Stripe 404、admin 永久 403 等) ため、デプロイ前に fail fast する。
          for v in GCP_PROJECT_ID GCP_PROJECT_NUMBER GCP_SERVICE_ACCOUNT \
                   CORS_ORIGIN STRIPE_PRO_PRICE_ID MAIL_FROM CONTACT_FROM \
                   OPERATOR_EMAILS ADMIN_USERNAME; do
            if [ -z "${!v}" ]; then
              echo "::error::Required variable/secret '$v' is not set. Define it in Settings → Secrets and variables → Actions before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Resolve backend image tag
        id: resolve-backend
        # Step output 化することで $GITHUB_ENV への書き込み (zizmor github-env) を回避する。
        run: |
          echo "image=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: backend/Dockerfile
          target: production
          tags: ${{ steps.resolve-backend.outputs.image }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true

      # zizmor cache-poisoning は setup-bun のデフォルトキャッシュを検知するが、本ワークフローは
      # workflow_run + branches: [main] でメインブランチ限定起動のため PR 由来のキャッシュ毒は発生しない。
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0  # zizmor: ignore[cache-poisoning]
        with:
          bun-version: 1.3.14

      - name: Run database migrations
        working-directory: backend
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=DATABASE_URL --project="${GCP_PROJECT_ID}")"
          export DATABASE_URL
          bun install --frozen-lockfile
          bunx drizzle-kit migrate

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.resolve-backend.outputs.image }}
          flags: >-
            --min-instances=0
            --max-instances=3
            --concurrency=80
            --cpu=1
            --memory=512Mi
            --allow-unauthenticated
            --port=8080
          env_vars: |
            NODE_ENV=production
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            STRIPE_PRO_PRICE_ID=${{ vars.STRIPE_PRO_PRICE_ID }}
            MAIL_DRIVER=resend
            MAIL_FROM=${{ vars.MAIL_FROM }}
            CONTACT_FROM=${{ vars.CONTACT_FROM }}
            OPERATOR_EMAILS=${{ secrets.OPERATOR_EMAILS }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            DOGFOODING_EMAILS=${{ secrets.DOGFOODING_EMAILS }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            ADMIN_PASSWORD=ADMIN_PASSWORD:latest

      - name: Set BETTER_AUTH_URL to public custom domain
        run: |
          gcloud run services update "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --update-env-vars "BETTER_AUTH_URL=https://${API_DOMAIN}"

  deploy-backup:
    name: Backup Job (Cloud Run Jobs)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7c453151 # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate required repository variables
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for v in GCP_PROJECT_ID GCP_PROJECT_NUMBER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository variable '$v' is not set. Define it in Settings → Actions → Variables before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Resolve backup image tag
        id: resolve-backup
        # Step output 化することで $GITHUB_ENV への書き込み (zizmor github-env) を回避する。
        run: |
          echo "image=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backup:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backup image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./backup
          file: backup/Dockerfile
          tags: ${{ steps.resolve-backup.outputs.image }}
          push: true
          provenance: false
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup,ignore-error=true

      - name: Deploy Cloud Run Job with new image
        env:
          IMAGE: ${{ steps.resolve-backup.outputs.image }}
        run: |
          gcloud run jobs deploy "${CLOUD_RUN_JOB_BACKUP}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --image="${IMAGE}"

  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    needs: deploy-backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7c453151 # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for v in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository secret '$v' is not set. Define it in Settings → Secrets and variables → Actions before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      # zizmor cache-poisoning は setup-bun のデフォルトキャッシュを検知するが、本ワークフローは
      # workflow_run + branches: [main] でメインブランチ限定起動のため PR 由来のキャッシュ毒は発生しない。
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0  # zizmor: ignore[cache-poisoning]
        with:
          bun-version: 1.3.14
      - name: Install and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
        env:
          VITE_API_URL: https://${{ env.API_DOMAIN }}
          VITE_GA_TRACKING_ID: ${{ vars.VITE_GA_TRACKING_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler v4 は Node 22+ 必須。setup-bun した bun 1.3.14 が偽装する
          # process.version は v20.20.2 のため、wrangler v4 を bun で起動すると
          # "Wrangler requires at least Node.js v22.0.0" で起動拒否される。
          # bun を上げるか setup-node@22 を併用するまでの暫定処置として v3 に固定する。
          wranglerVersion: '3'
          command: pages deploy frontend/dist --project-name ${{ env.CF_PAGES_PROJECT }} --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message="Deploy ${{ github.sha }}"
