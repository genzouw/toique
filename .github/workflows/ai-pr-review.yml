name: AI PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai_review:
    name: Automated PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read
    concurrency:
      group: ai-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 差分を取得し、文字数が多すぎる場合は切り詰める (約10,000文字程度に制限)
          PR_NUMBER=${{ github.event.pull_request.number }}
          DIFF=$(gh pr diff $PR_NUMBER || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$DIFF" | head -c 10000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Code Review with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';

            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') {
              console.log('No valid diff to review. Skipping.');
              return;
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアであり、以下のPull Requestのコードレビューを行います。
            回答は必ず日本語で、Markdown形式で出力してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【Pull Requestの説明】
            ${prBody}

            【コードの差分 (一部切り詰められている可能性があります)】
            \`\`\`diff
            ${prDiff}
            \`\`\`

            以下の観点からレビューを行い、問題点や改善案を提示してください：
            - バグの可能性やロジックの誤り
            - パフォーマンス上の懸念（O(N)ループや無駄なデータベースクエリなど）
            - セキュリティの脆弱性（APIキーのハードコード、XSS、SQLインジェクションなど）
            - コードの可読性や保守性

            ※ 差分に対して問題が見当たらない場合は、肯定的なフィードバック（LGTM等）を返してください。
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  { role: "system", content: "You are an expert software engineer performing code reviews. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const reviewComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI コードレビュー (GitHub Models):**\n\n" + reviewComment
            });
