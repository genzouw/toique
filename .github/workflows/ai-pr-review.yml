name: AI PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai_review:
    name: Automated PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ai-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 差分を取得し、文字数が多すぎる場合は切り詰める (約10,000文字程度に制限)
          PR_NUMBER=${{ github.event.pull_request.number }}
          DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$DIFF" | head -c 10000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Search Dependencies
        run: pip install "duckduckgo-search>=6.0.0" "tavily-python>=0.3.3" --break-system-packages

      - name: Search via Tavily or DuckDuckGo (RAG prep)
        id: search_web
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          import os
          import base64
          import time

          title = os.environ.get('PR_TITLE', '')
          query = f"{title} (vulnerability OR bug OR best practices OR performance OR security OR accessibility)"
          tavily_key = os.environ.get('TAVILY_API_KEY', '').strip()

          search_res = ""

          if tavily_key:
              print("Using Tavily API for search...")
              try:
                  from tavily import TavilyClient
                  tavily_client = TavilyClient(api_key=tavily_key)
                  response = tavily_client.search(query=query, search_depth="basic", max_results=5)
                  results = response.get('results', [])
                  if results:
                      search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('url')}\nSnippet: {r.get('content')}" for r in results])
              except Exception as e:
                  print(f"Tavily search failed: {e}. Falling back to DuckDuckGo...")
                  tavily_key = "" # Fallback

          if not tavily_key:
              print("Using DuckDuckGo for search...")
              from duckduckgo_search import DDGS
              try:
                  with DDGS() as ddgs:
                      # retry mechanism due to frequent rate limits
                      for _ in range(3):
                          try:
                              results = list(ddgs.text(query, max_results=5))
                              if results:
                                  search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])
                                  break
                          except Exception as inner_e:
                              time.sleep(2)
                              continue
              except Exception as e:
                  search_res = f"Web search failed: {e}"

          if not search_res:
              search_res = "No relevant Web search results found."

          delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"WEB_SEARCH_RESULTS<<{delimiter}\n")
              f.write(f"{search_res}\n")
              f.write(f"{delimiter}\n")
        shell: python

      - name: Code Review with GitHub Models
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
          WEB_SEARCH_RESULTS: ${{ env.WEB_SEARCH_RESULTS }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';
            const searchResults = process.env.WEB_SEARCH_RESULTS || '';

            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') {
              console.log('No valid diff to review. Skipping.');
              return;
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアであり、以下のPull Requestのコードレビューを行います。
            回答は必ず日本語で、Markdown形式で出力してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【Pull Requestの説明】
            ${prBody}

            【Web検索結果 (RAG用の最新技術情報・脆弱性情報・ベストプラクティス参考)】
            ${searchResults}

            【コードの差分 (一部切り詰められている可能性があります)】
            \`\`\`diff
            ${prDiff}
            \`\`\`

            以下の観点から徹底的にレビューを行い、問題点や具体的な改善コード（スニペット）を提示してください：
            - バグの可能性やロジックの誤り
            - **パフォーマンス**: O(N)ループの回避、N+1問題の防止、不要なデータベースクエリの削減など
            - **セキュリティ**: APIキーや認証情報のハードコード・ログ漏洩の有無、XSS、SQLインジェクション、認可不足、不適切な権限設定、CORS/CSRFの設定崩れ。
            - **AI固有の脆弱性**: プロンプトインジェクションへの対策、LLMに入力される外部コンテキストのサニタイズ漏れ。
            - **アクセシビリティ**: ボタン等のアクション要素における具体的な対象を含んだ `aria-label` や `title` の付与、`role="tablist"` におけるキーボードナビゲーションのサポートなど。
            - **テストカバレッジ**: 重要なロジックの変更や新機能追加に対して、適切なテスト（ユニットテストやE2Eテスト等）が追加されているか。
            - コードの可読性や保守性、Web検索結果から得られる最新のベストプラクティスに沿っているか。

            ※ 差分に対して問題が見当たらない場合は、肯定的なフィードバック（LGTM等）を返してください。
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o',
                messages: [
                  { role: "system", content: "You are an expert software engineer performing code reviews. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const reviewComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI コードレビュー (GitHub Models):**\n\n" + reviewComment
            });
