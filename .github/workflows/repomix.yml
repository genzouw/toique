name: Repomix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  repomix:
    name: Repomix でリポジトリをパックする
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Repomix でリポジトリをパックする
        # AIフレンドリーな形式（XML）でリポジトリ全体を1つのファイルにまとめる
        uses: yamadashy/repomix/.github/actions/repomix@bb4ac4763faeb7fc3d31438f072a6946b5b290b9 # v1.15.0
        with:
          output: repomix-output.xml
          compress: true

      - name: Repomix 出力アーティファクトのアップロード
        # 生成されたXMLファイルを、AIツールなどで後から利用できるように保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repomix-output
          path: repomix-output.xml
          retention-days: 30
