name: Repomix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  repomix:
    name: Repomix でリポジトリをパックする
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: リポジトリのチェックアウト
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Node.js のセットアップ
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Repomix でリポジトリをパックする
        # AIフレンドリーな形式（XML）でリポジトリ全体を1つのファイルにまとめる
        # 注: リポジトリの Actions 設定 (selected actions) が個人アカウント提供の
        # yamadashy/repomix Composite Action を許可していないため startup_failure が発生する。
        # 許可済みの github-owned アクション (actions/setup-node) + npm 経由での直接実行に切り替える。
        # バージョンは zizmor (adhoc-packages) 対策として latest ではなく固定値を指定する。
        run: |
          npm install --global repomix@1.16.0
          repomix --output repomix-output.xml --compress

      - name: Repomix 出力アーティファクトのアップロード
        # 生成されたXMLファイルを、AIツールなどで後から利用できるように保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repomix-output
          path: repomix-output.xml
          retention-days: 30
