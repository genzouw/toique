name: AI ChatOps

on:
  issue_comment:
    types: [created]

jobs:
  ai_chatops:
    name: Respond to AI Commands
    # 実行対象は Pull Request に対するコメントのみ、かつ特定のコマンドで始まる場合
    # 公開リポジトリでのAbuse防止のため、権限を持つユーザーからのコメントのみ実行
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ai ') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Parse Command and Query
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # '/ai ' プレフィックスを削除してクエリを取得
          QUERY=$(echo "$COMMENT_BODY" | sed 's/^\/ai //')

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "USER_QUERY<<$DELIMITER"
            echo "$QUERY"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Install DuckDuckGo Search
        run: pip install "duckduckgo-search==8.1.1" --break-system-packages

      - name: Web Search for Context
        id: web_search
        run: |
          import os
          import base64
          from duckduckgo_search import DDGS

          query = os.environ.get('USER_QUERY', '')

          try:
              results = DDGS().text(query, max_results=3)
              search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])

              if not search_res:
                  search_res = "No relevant Web search results found."

              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"WEB_CONTEXT<<{delimiter}\n")
                  f.write(f"{search_res}\n")
                  f.write(f"{delimiter}\n")
          except Exception as e:
              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"WEB_CONTEXT<<{delimiter}\n")
                  f.write(f"Web search failed: {e}\n")
                  f.write(f"{delimiter}\n")
        shell: python

      - name: Generate AI Response
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_QUERY: ${{ env.USER_QUERY }}
          WEB_CONTEXT: ${{ env.WEB_CONTEXT }}
        with:
          script: |
            const prompt = `
            あなたはソフトウェアエンジニアを支援するAIアシスタントです。
            以下のユーザーからのリクエスト（コマンドおよび質問）に対して、適切な回答や修正案を日本語で提示してください。
            必要に応じて提供されたWeb検索結果を参考にしてください。

            【ユーザーのリクエスト】
            ${process.env.USER_QUERY}

            【Web検索結果 (参考)】
            ${process.env.WEB_CONTEXT}
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  { role: "system", content: "You are a helpful software engineering AI assistant. Always answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const aiReply = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI ChatOps:**\n\n" + aiReply
            });
