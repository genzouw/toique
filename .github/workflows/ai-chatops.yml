name: AI ChatOps

on:
  issue_comment:
    types: [created]

jobs:
  ai_chatops:
    name: Respond to AI Commands
    # 実行対象は Pull Request に対するコメントのみ、かつ /ai コマンドで始まる場合
    # 公開リポジトリでのAbuse防止のため、権限を持つユーザーからのコメントのみ実行
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ai ') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get PR Information
        id: get_pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$PR_DIFF" | head -c 10000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Install Search Dependencies
        run: pip install "duckduckgo-search>=6.0.0" "tavily-python>=0.3.3" --break-system-packages

      - name: Search via Tavily or DuckDuckGo (RAG prep)
        id: search_web
        env:
          USER_PROMPT: ${{ github.event.comment.body }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          import os
          import base64
          import time

          # '/ai ' プレフィックスを削除して検索クエリを構築
          prompt = os.environ.get('USER_PROMPT', '')
          query = prompt.replace('/ai ', '').strip()
          tavily_key = os.environ.get('TAVILY_API_KEY', '').strip()

          search_res = ""

          if tavily_key:
              print("Using Tavily API for search...")
              try:
                  from tavily import TavilyClient
                  tavily_client = TavilyClient(api_key=tavily_key)
                  response = tavily_client.search(query=query, search_depth="basic", max_results=5)
                  results = response.get('results', [])
                  if results:
                      search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('url')}\nSnippet: {r.get('content')}" for r in results])
              except Exception as e:
                  print(f"Tavily search failed: {e}. Falling back to DuckDuckGo...")
                  tavily_key = "" # Fallback

          if not tavily_key:
              print("Using DuckDuckGo for search...")
              from duckduckgo_search import DDGS
              try:
                  with DDGS() as ddgs:
                      for _ in range(3):
                          try:
                              results = list(ddgs.text(query, max_results=5))
                              if results:
                                  search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])
                                  break
                          except Exception as inner_e:
                              time.sleep(2)
                              continue
              except Exception as e:
                  search_res = f"Web search failed: {e}"

          if not search_res:
              search_res = "No relevant Web search results found."

          delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"WEB_SEARCH_RESULTS<<{delimiter}\n")
              f.write(f"{search_res}\n")
              f.write(f"{delimiter}\n")
        shell: python

      - name: Generate Response with GitHub Models
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
          USER_PROMPT: ${{ github.event.comment.body }}
          WEB_SEARCH_RESULTS: ${{ env.WEB_SEARCH_RESULTS }}
        with:
          script: |
            const prompt = process.env.USER_PROMPT.replace('/ai ', '').trim();
            const prDiff = process.env.PR_DIFF || '';
            const searchResults = process.env.WEB_SEARCH_RESULTS || '';
            const author = context.payload.comment.user.login;

            const systemPrompt = `
            あなたはシニアソフトウェアエンジニアであり、AIアシスタントとしてPull Requestのコメント経由で開発者をサポートします。
            以下の情報を元に、ユーザーの質問や指示に日本語のMarkdown形式で丁寧に回答してください。
            もしコードの改善や修正を提案する場合は、以下の観点（パフォーマンス、セキュリティ、AI脆弱性、アクセシビリティ、テストカバレッジ）を意識して、具体的なコードスニペットを含めて回答してください。

            【Pull Request の現在の差分 (一部)】
            \`\`\`diff
            ${prDiff}
            \`\`\`

            【Web検索結果 (RAG用の最新技術情報参考)】
            ${searchResults}
            `;

            const userMessage = `ユーザー（@${author}）からの要求:\n${prompt}`;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o',
                messages: [
                  { role: "system", content: systemPrompt },
                  { role: "user", content: userMessage }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 エラーが発生しました。AIモデルAPIの呼び出しに失敗しました (status: ${response.status})。`
              });
              return;
            }

            const data = await response.json();
            if (data.error || !data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned error or no choices');
              return;
            }

            const reply = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `> ${process.env.USER_PROMPT}\n\n🤖 **AI ChatOps 回答:**\n\n${reply}`
            });
