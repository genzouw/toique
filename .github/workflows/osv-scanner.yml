name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 23 * * 0' # 毎週月曜 08:00 JST (= 日曜 23:00 UTC) に実行
  workflow_dispatch:

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  osv-scanner:
    name: Scan for vulnerable dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@daa2c68f50d845057895a9c300e42478481c1d26 # v1.9.1
        with:
          scan-args: |-
            -r
            --skip-git
            --format=sarif
            --output=results.sarif
            ./

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: results.sarif
          category: osv-scanner
