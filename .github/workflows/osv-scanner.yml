name: OSV-Scanner

on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 06:30 JST (= 日曜 21:30 UTC) に実行
    - cron: '30 21 * * 0'
  workflow_dispatch:

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  osv-scanner:
    name: Scan for vulnerabilities (OSV-Scanner)
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            -r
            --config=infra/osv-scanner.toml
            --format=sarif
            --output=results.sarif
            ./

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: osv-scanner
