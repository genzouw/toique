name: AI PR Description Generator

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate_pr_description:
    name: Generate PR Description
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ai-pr-description-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR Information
        id: get_pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch PR diff
          PR_DIFF=$(gh pr diff "$PR_NUMBER" || echo "Cannot fetch diff.")
          TRUNCATED_DIFF=$(echo "$PR_DIFF" | head -c 10000)

          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "PR_DIFF<<$DELIMITER"
            echo "$TRUNCATED_DIFF"
            echo "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Generate PR Description with GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ env.PR_DIFF }}
        with:
          script: |
            const prDiff = process.env.PR_DIFF || '';
            const prTitle = context.payload.pull_request.title || '';
            const prBody = context.payload.pull_request.body || '';

            if (!prDiff || prDiff.trim() === 'Cannot fetch diff.') {
              console.log('No valid diff to review. Skipping.');
              return;
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のPull Requestのコードの差分を分析し、PRの説明文（Description）を自動生成または改善してください。
            回答は必ず日本語で、分かりやすいMarkdown形式で出力してください。
            目的、主な変更点、テストの観点などを整理して記述してください。

            【Pull Requestのタイトル】
            ${prTitle}

            【現在のPull Requestの説明】
            ${prBody}

            【コードの差分 (一部切り詰められている可能性があります)】
            \`\`\`diff
            ${prDiff}
            \`\`\`
            `;

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                messages: [
                  { role: "developer", content: "You are an expert software engineer generating pull request descriptions. Answer in Japanese." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`GitHub Models API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('GitHub Models API Error:', data.error);
              return;
            }
            if (!data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned no choices:', JSON.stringify(data));
              return;
            }
            const reviewComment = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AIによるPR説明文の提案 (GitHub Models):**\n\n" + reviewComment + "\n\n---\n*※この提案をコピーしてPRのDescriptionを更新することをおすすめします。*"
            });
