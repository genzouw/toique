name: SBOM Generation

on:
  push:
  pull_request:
  schedule:
    # 毎週月曜 07:30 JST (= 日曜 22:30 UTC) に実行
    - cron: '30 22 * * 0'
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 14
