name: AI Auto Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Target Pull Request number (in this repository)'
        required: true
        type: string
      instruction:
        description: 'Instruction passed to the AI (formerly the text after `/ai-fix ` in a PR comment)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ai_auto_fix:
    name: Generate Code Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Fetch PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          DATA=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")
          HEAD_SHA=$(printf '%s' "$DATA" | jq -r '.head.sha')
          HEAD_REF=$(printf '%s' "$DATA" | jq -r '.head.ref')
          HEAD_REPO=$(printf '%s' "$DATA" | jq -r '.head.repo.full_name')
          BASE_REPO=$(printf '%s' "$DATA" | jq -r '.base.repo.full_name')
          {
            echo "head_sha=$HEAD_SHA"
            echo "head_ref=$HEAD_REF"
            echo "head_repo=$HEAD_REPO"
            echo "base_repo=$BASE_REPO"
          } >> "$GITHUB_OUTPUT"

      - name: Reject PRs from forks
        if: steps.pr.outputs.head_repo != steps.pr.outputs.base_repo
        run: |
          echo "::error::AI auto-fix は同一リポジトリの PR のみで利用可能です (fork からの PR ではセキュリティ上利用できません)。"
          exit 1

      - name: Checkout PR head at immutable SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Fix with GitHub Models
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_MODELS }}
          USER_PROMPT: ${{ inputs.instruction }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const promptInstruction = process.env.USER_PROMPT.trim();
            const prNumber = process.env.PR_NUMBER;

            // Optional: You might want to get the diff or file list to give context to the model
            const prDiffCmd = `gh pr diff ${prNumber}`;
            let prDiff = '';
            try {
              const { execSync } = require('child_process');
              prDiff = execSync(prDiffCmd, { encoding: 'utf-8', env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN } });
              // Truncate diff to avoid token limits
              prDiff = prDiff.substring(0, 10000);
            } catch(e) {
              console.warn("Could not fetch PR diff for context");
            }

            const prompt = `
            あなたはシニアソフトウェアエンジニアであり、AIアシスタントとしてPull Requestのコードを自動修正します。
            以下の情報を元に、ユーザーの指示に従ってコードを修正してください。
            修正を生成する際は、セキュリティ（認証情報の漏洩防止など）、パフォーマンス（N+1問題や不要なループの回避）、アクセシビリティ、AI固有の脆弱性対策を意識して、セキュアで品質の高いコードを出力してください。

            【Pull Request の現在の差分 (一部)】
            \`\`\`diff
            ${prDiff}
            \`\`\`

            【ユーザーからの修正指示】
            ${promptInstruction}

            また、Cloudflare Pagesの制約としてconsole.logではなくconsole.infoを使うこと、パフォーマンスのため...map()ではなくfor...ofループを使うこと、アクセシビリティのため装飾アイコンにはaria-hidden="true"を付与することを考慮してください。

            回答は、修正するファイルのパスと、そのファイルの「新しい完全な内容」を含むオブジェクトの配列（fixes）をルートプロパティとして持つJSONを出力してください。Markdown ブロックやその他の説明を含めないでください。
            `;

            const schema = {
              type: "object",
              properties: {
                fixes: {
                  type: "array",
                  items: {
                    type: "object",
                    properties: {
                      filepath: {
                        type: "string",
                        pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:/|$)).+"
                      },
                      content: { type: "string" }
                    },
                    required: ["filepath", "content"],
                    additionalProperties: false
                  }
                }
              },
              required: ["fixes"],
              additionalProperties: false
            };

            console.log("Calling GitHub Models...");
            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'openai/o3-mini',
                reasoning_effort: "high",
                response_format: {
                  type: "json_schema",
                  json_schema: {
                    name: "ai_response",
                    strict: true,
                    schema: schema
                  }
                },
                messages: [
                  { role: "developer", content: "You are an expert developer. Output strictly JSON object containing fixes." },
                  { role: "user", content: prompt }
                ]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              console.error(`GitHub Models API Error: status=${response.status} body=${err}`);
              throw new Error(`GitHub Models API Error: ${response.status}`);
            }

            const data = await response.json();
            if (data.error || !data.choices || data.choices.length === 0) {
              console.error('GitHub Models API returned error or no choices');
              throw new Error('API Error');
            }

            let reply = data.choices[0].message.content.trim();

            // Remove markdown code block if model included it
            if (reply.startsWith('```json')) {
              reply = reply.replace(/^```json\n/, '').replace(/\n```$/, '');
            } else if (reply.startsWith('```')) {
              reply = reply.replace(/^```\n/, '').replace(/\n```$/, '');
            }

            let fixes = [];
            try {
              const parsed = JSON.parse(reply);
              if (!parsed || !Array.isArray(parsed.fixes)) {
                throw new Error('Invalid response shape: fixes must be an array');
              }
              fixes = parsed.fixes;
            } catch(e) {
              console.error('Failed to parse model response as JSON:', reply);
              throw new Error('JSON Parse Error');
            }

            const path = require('path');
            for (const fix of fixes) {
              if (fix.filepath && fix.content) {
                const normalized = path.normalize(fix.filepath);
                if (path.isAbsolute(normalized) || normalized.startsWith('..')) {
                  throw new Error(`Invalid filepath from model: ${fix.filepath}`);
                }
                console.log(`Writing changes to ${normalized}`);
                fs.writeFileSync(normalized, fix.content);
              }
            }

      - name: Commit and Push Changes
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "bot: auto-fix applied via workflow_dispatch"
          # Push back to the PR head branch by name. Detached HEAD checkout requires
          # specifying the destination ref explicitly. Fast-forward only; if the branch
          # has moved while we ran, the push will fail safely.
          # checkout は persist-credentials: false で認証情報を残さないため、push 時に都度認証を渡す
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
