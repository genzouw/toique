name: AI Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: AI Issue Analysis
    runs-on: ubuntu-latest
    # 公開リポジトリで第三者が OPENAI_API_KEY を消費しないよう、
    # 信頼できる author_association のみ実行可能にする。
    if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    permissions:
      issues: write
    concurrency:
      group: ai-issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Search Similar Issues (RAG prep)
        id: search_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # タイトルのキーワードを用いて類似の Issue を検索
          # 検索結果を最大 5 件取得
          SEARCH_QUERY="$ISSUE_TITLE is:issue"
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "SEARCH_RESULTS<<$DELIMITER" >> "$GITHUB_ENV"
          gh issue list --search "$SEARCH_QUERY" --limit 5 --state all >> "$GITHUB_ENV" || echo "No similar issues found or search failed." >> "$GITHUB_ENV"
          echo "$DELIMITER" >> "$GITHUB_ENV"

      - name: Search Stack Overflow (RAG prep)
        id: search_so
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # 検索クエリをURLエンコード
          import urllib.parse
          import os
          import json
          import urllib.request
          import base64

          title = os.environ.get('ISSUE_TITLE', '')
          encoded_title = urllib.parse.quote(title)
          url = f"https://api.stackexchange.com/2.3/search/advanced?order=desc&sort=relevance&q={encoded_title}&site=stackoverflow&filter=withbody"

          try:
              req = urllib.request.Request(url)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  items = data.get('items', [])[:3] # 上位3件
                  results = []
                  for item in items:
                      results.append(f"Q: {item.get('title')}\nA: {item.get('link')}")

                  search_res = "\n\n".join(results)
                  if not search_res:
                      search_res = "No relevant Stack Overflow issues found."

                  delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
                  with open(os.environ['GITHUB_ENV'], 'a') as f:
                      f.write(f"SO_SEARCH_RESULTS<<{delimiter}\n")
                      f.write(f"{search_res}\n")
                      f.write(f"{delimiter}\n")
          except Exception as e:
              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"SO_SEARCH_RESULTS<<{delimiter}\n")
                  f.write(f"Stack Overflow search failed: {e}\n")
                  f.write(f"{delimiter}\n")
        shell: python

      - name: Call OpenAI for Issue Triage
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEARCH_RESULTS: ${{ env.SEARCH_RESULTS }}
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title || '';
            const searchResults = process.env.SEARCH_RESULTS || '';
            const soSearchResults = process.env.SO_SEARCH_RESULTS || '';

            if (!process.env.OPENAI_API_KEY) {
              console.log('OPENAI_API_KEY is not set. Skipping triage.');
              return;
            }

            const prompt = `
            以下のGitHub Issueを分析し、適切なラベルや回答案を日本語で提案してください。
            このリポジトリはLINE問い合わせ受付SaaS（Bun, Hono, React 19）です。

            タイトル: ${issueTitle}
            本文: ${issueBody}

            【過去の類似Issue検索結果】
            ${searchResults}

            【Stack Overflow 検索結果 (参考)】
            ${soSearchResults}

            上記検索結果も踏まえ、すでに解決済みの問題であれば解決策を提示し、未解決のバグや新規提案であればその旨をコメントに含めてください。
            `;

            // Use Structured Outputs (JSON Schema) for deterministic JSON response
            const schema = {
              type: "object",
              properties: {
                aiReply: {
                  type: "string",
                  description: "ユーザーへの返信コメント（Markdown形式・日本語）"
                },
                suggestedLabels: {
                  type: "array",
                  items: {
                    type: "string",
                    enum: ["bug", "enhancement", "question", "documentation", "help wanted"]
                  },
                  description: "Issueに付与すべきラベルの配列"
                }
              },
              required: ["aiReply", "suggestedLabels"],
              additionalProperties: false
            };

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
              },
              body: JSON.stringify({
                model: 'gpt-4o', // or gpt-4o-2024-08-06 which supports structured outputs reliably
                messages: [
                  { role: 'system', content: 'You are a helpful AI assistant for an open source project. Always answer in Japanese and follow the JSON schema.' },
                  { role: 'user', content: prompt }
                ],
                response_format: {
                  type: "json_schema",
                  json_schema: {
                    name: "issue_triage",
                    strict: true,
                    schema: schema
                  }
                }
              })
            });

            if (!response.ok) {
              console.error(`OpenAI API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            const aiReply = result.aiReply;
            const labels = result.suggestedLabels || [];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI トリアージ結果:**\n\n" + aiReply
            });

            if (labels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labels
                });
                console.log(`Added labels: ${labels.join(', ')}`);
              } catch (e) {
                console.error(`Failed to add labels: ${e.message}`);
              }
            }
