name: AI Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: AI Issue Analysis
    runs-on: ubuntu-latest
    # 公開リポジトリで第三者が OPENAI_API_KEY を消費しないよう、
    # 信頼できる author_association のみ実行可能にする。
    if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    permissions:
      issues: write
    concurrency:
      group: ai-issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Search Similar Issues (RAG prep)
        id: search_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # タイトルのキーワードを用いて類似の Issue を検索
          # 検索結果を最大 5 件取得
          SEARCH_QUERY="$ISSUE_TITLE is:issue"
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "SEARCH_RESULTS<<$DELIMITER" >> "$GITHUB_ENV"
          gh issue list --search "$SEARCH_QUERY" --limit 5 --state all >> "$GITHUB_ENV" || echo "No similar issues found or search failed." >> "$GITHUB_ENV"
          echo "$DELIMITER" >> "$GITHUB_ENV"

      - name: Search Stack Overflow (RAG prep)
        id: search_so
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # 検索クエリをURLエンコード
          import urllib.parse
          import os
          import json
          import urllib.request
          import base64

          title = os.environ.get('ISSUE_TITLE', '')
          encoded_title = urllib.parse.quote(title)
          url = f"https://api.stackexchange.com/2.3/search/advanced?order=desc&sort=relevance&q={encoded_title}&site=stackoverflow&filter=withbody"

          try:
              req = urllib.request.Request(url)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  items = data.get('items', [])[:3] # 上位3件
                  results = []
                  for item in items:
                      results.append(f"Q: {item.get('title')}\nA: {item.get('link')}")

                  search_res = "\n\n".join(results)
                  if not search_res:
                      search_res = "No relevant Stack Overflow issues found."

                  delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
                  with open(os.environ['GITHUB_ENV'], 'a') as f:
                      f.write(f"SO_SEARCH_RESULTS<<{delimiter}\n")
                      f.write(f"{search_res}\n")
                      f.write(f"{delimiter}\n")
          except Exception as e:
              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"SO_SEARCH_RESULTS<<{delimiter}\n")
                  f.write(f"Stack Overflow search failed: {e}\n")
                  f.write(f"{delimiter}\n")
        shell: python

      - name: Install DuckDuckGo Search
        run: pip install duckduckgo-search

      - name: Search DuckDuckGo (RAG prep)
        id: search_ddg
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          import os
          import base64
          from duckduckgo_search import DDGS

          title = os.environ.get('ISSUE_TITLE', '')
          query = f"{title} site:stackoverflow.com OR site:github.com"

          try:
              results = DDGS().text(query, max_results=3)
              search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])

              if not search_res:
                  search_res = "No relevant Web search results found."

              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"WEB_SEARCH_RESULTS<<{delimiter}\n")
                  f.write(f"{search_res}\n")
                  f.write(f"{delimiter}\n")
          except Exception as e:
              delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"WEB_SEARCH_RESULTS<<{delimiter}\n")
                  f.write(f"Web search failed: {e}\n")
                  f.write(f"{delimiter}\n")
        shell: python

      - name: Call Gemini for Issue Triage
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEARCH_RESULTS: ${{ env.SEARCH_RESULTS }}
          WEB_SEARCH_RESULTS: ${{ env.WEB_SEARCH_RESULTS }}
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title || '';
            const searchResults = process.env.SEARCH_RESULTS || '';
            const soSearchResults = process.env.SO_SEARCH_RESULTS || '';
            const webSearchResults = process.env.WEB_SEARCH_RESULTS || '';

            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY is not set. Skipping triage.');
              return;
            }

            const prompt = `
            以下のGitHub Issueを分析し、適切なラベルや回答案を日本語で提案してください。
            このリポジトリはLINE問い合わせ受付SaaS（Bun, Hono, React 19）です。

            タイトル: ${issueTitle}
            本文: ${issueBody}

            【過去の類似Issue検索結果】
            ${searchResults}

            【Stack Overflow 検索結果 (参考)】
            ${soSearchResults}

            【Web 検索結果 (参考)】
            ${webSearchResults}

            上記検索結果も踏まえ、すでに解決済みの問題であれば解決策をより具体的に（可能であればコード例や設定手順などを交えて）提示し、未解決のバグや新規提案であればその旨をコメントに含めてください。また、報告者に対する感謝の言葉を添えてください。
            `;

            // Use Structured Outputs (JSON Schema) for deterministic JSON response
            const schema = {
              type: "object",
              properties: {
                aiReply: {
                  type: "string",
                  description: "ユーザーへの返信コメント（Markdown形式・日本語）"
                },
                suggestedLabels: {
                  type: "array",
                  items: {
                    type: "string",
                    enum: ["bug", "enhancement", "question", "documentation", "help wanted"]
                  },
                  description: "Issueに付与すべきラベルの配列"
                }
              },
              required: ["aiReply", "suggestedLabels"],
              additionalProperties: false
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                system_instruction: {
                  parts: { text: "You are a helpful AI assistant for an open source project. Always answer in Japanese and output raw JSON (do not wrap in markdown blocks like ```json). The JSON must exactly follow this structure: {\"aiReply\": \"string\", \"suggestedLabels\": [\"bug\"|\"enhancement\"|\"question\"|\"documentation\"|\"help wanted\"]}" }
                },
                contents: [{
                  role: "user",
                  parts: [{ text: prompt }]
                }],
                generationConfig: {
                  response_mime_type: "application/json"
                }
              })
            });

            if (!response.ok) {
              console.error(`Gemini API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            if (data.error) {
              console.error('Gemini API Error:', data.error);
              return;
            }
            let textResult = data.candidates[0].content.parts[0].text;
            // Clean up any potential markdown formatting from Gemini
            if (textResult.startsWith('```json')) {
              textResult = textResult.replace(/^```json\n/, '').replace(/\n```$/, '');
            }
            const result = JSON.parse(textResult);
            const aiReply = result.aiReply;
            const labels = result.suggestedLabels || [];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI トリアージ結果:**\n\n" + aiReply
            });

            if (labels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labels
                });
                console.log(`Added labels: ${labels.join(', ')}`);
              } catch (e) {
                console.error(`Failed to add labels: ${e.message}`);
              }
            }
