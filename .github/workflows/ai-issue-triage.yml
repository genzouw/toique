name: AI Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: AI Issue Analysis
    runs-on: ubuntu-latest
    # 公開リポジトリで第三者が OPENAI_API_KEY を消費しないよう、
    # 信頼できる author_association のみ実行可能にする。
    if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    permissions:
      issues: write
    concurrency:
      group: ai-issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Search Similar Issues (RAG prep)
        id: search_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # タイトルのキーワードを用いて類似の Issue を検索
          # 検索結果を最大 5 件取得
          SEARCH_QUERY="$ISSUE_TITLE is:issue"
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "SEARCH_RESULTS<<$DELIMITER" >> "$GITHUB_ENV"
          gh issue list --search "$SEARCH_QUERY" --limit 5 --state all >> "$GITHUB_ENV" || echo "No similar issues found or search failed." >> "$GITHUB_ENV"
          echo "$DELIMITER" >> "$GITHUB_ENV"

      - name: Call OpenAI for Issue Triage
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEARCH_RESULTS: ${{ env.SEARCH_RESULTS }}
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title || '';
            const searchResults = process.env.SEARCH_RESULTS || '';

            if (!process.env.OPENAI_API_KEY) {
              console.log('OPENAI_API_KEY is not set. Skipping triage.');
              return;
            }

            const prompt = `
            以下のGitHub Issueを分析し、適切なラベルや回答案を日本語で提案してください。
            このリポジトリはLINE問い合わせ受付SaaS（Bun, Hono, React 19）です。

            タイトル: ${issueTitle}
            本文: ${issueBody}

            【過去の類似Issue検索結果】
            ${searchResults}

            上記検索結果も踏まえ、すでに解決済みの問題であれば解決策を提示し、未解決のバグや新規提案であればその旨をコメントに含めてください。
            `;

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  { role: 'system', content: 'You are a helpful AI assistant for an open source project. Always answer in Japanese.' },
                  { role: 'user', content: prompt }
                ]
              })
            });

            if (!response.ok) {
              console.error(`OpenAI API Error: status=${response.status}`);
              return;
            }

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **AI トリアージ結果:**\n\n" + aiReply
            });
