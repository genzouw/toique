name: DepTrust Supply Chain Security

on:
  push:
    branches: ['main']
  pull_request:
  schedule:
    # 毎週火曜 10:30 JST (01:30 UTC) にスキャン
    - cron: '30 1 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deptrust:
    name: DepTrust Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run DepTrust to check GitHub Actions dependencies
        run: |
          npx deptrust@latest check github-actions
