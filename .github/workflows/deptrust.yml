name: DepTrust Supply Chain Security

on:
  push:
    branches: ['main']
  pull_request:
  schedule:
    # 毎週火曜 10:30 JST (01:30 UTC) にスキャン
    - cron: '30 1 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deptrust:
    name: DepTrust Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run DepTrust to check GitHub Actions dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes @clidey/deptrust@latest install --yes
          export PATH="$HOME/.local/bin:$PATH"
          # 同一リポジトリ・同一SHAでもアクションのサブパス（/init, /analyze等）が異なると
          # sort -u で重複排除されず、同じ repo@sha を複数回チェックしてしまう
          # (GitHub Advisory DBへの無駄なAPIコールがsecondary rate limit/403を誘発する)ため、
          # owner/repo@sha 単位で正規化してから重複排除する
          refs=$(grep -rhoE '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*[A-Za-z0-9_.-]+/[A-Za-z0-9_./-]+@[A-Za-z0-9]+' .github/workflows/*.yml \
            | sed -E 's/.*uses:[[:space:]]*//' \
            | awk -F'@' '{split($1, parts, "/"); print parts[1] "/" parts[2] "@" $2}' \
            | sort -u)
          # deptrustは認証なしでpublic registry/OSV/GitHub Advisory DBのAPIを直接叩くため、
          # 参照数が多いワークフローではリクエストが連続しsecondary rate limit(HTTP 403)に
          # ぶつかることがある。指数バックオフでのリトライとリクエスト間隔で緩和する。
          check_with_retry() {
            local repo="$1" sha="$2" attempt=1 max_attempts=5 wait=3
            while true; do
              if result=$(deptrust check --json github-actions "$repo" "$sha" 2>&1); then
                echo "$result"
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "$result" >&2
                return 1
              fi
              echo "::warning::deptrust check failed for $repo@$sha (attempt $attempt/$max_attempts), retrying in ${wait}s..." >&2
              sleep "$wait"
              wait=$((wait * 2))
              attempt=$((attempt + 1))
            done
          }

          fail=0
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            repo=$(echo "$ref" | cut -d'@' -f1 | cut -d'/' -f1-2)
            sha=$(echo "$ref" | cut -d'@' -f2)
            echo "::group::Checking $repo@$sha"
            if ! result=$(check_with_retry "$repo" "$sha"); then
              echo "::endgroup::"
              echo "::error::deptrust check failed for $repo@$sha after retries"
              fail=1
              continue
            fi
            echo "$result"
            rec=$(echo "$result" | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).recommendation')
            echo "::endgroup::"
            if [ "$rec" = "block" ]; then
              echo "::error::$repo@$sha recommendation=block"
              fail=1
            fi
            sleep 1
          done <<< "$refs"
          exit $fail
