# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Backend Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    # 直近リリース直後の不安定バージョンを掴まないため、最低 7 日待ってから更新 PR を作成する。
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    groups:
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript:
        patterns:
          - 'typescript'
          - 'tsx'
          - '@types/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
      hono:
        patterns:
          - 'hono'
          - '@hono/*'
    allow:
      - dependency-type: 'all'

  # Frontend Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    groups:
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
          - '@types/jsdom'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-router'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tw-animate-css'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vite-plugin-*'
    allow:
      - dependency-type: 'all'

  # ルートの Node.js 依存関係 (Root Node.js dependencies)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    # 直近リリース直後の不安定バージョンを掴まないため、最低 7 日待ってから更新 PR を作成する。
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'root'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    allow:
      - dependency-type: 'all'

  # Infra (CDKTF) Node.js dependencies
  # version update の自動 PR は受けず、security updates のみ対象とする
  # (open-pull-requests-limit: 0 で version updates を停止)。
  # minimatch / glob / lodash / brace-expansion の脆弱性は cdktf がバンドルする
  # archiver / archiver-utils / その他 vendored deps の内部 (bundleDependencies)
  # にあり、npm overrides では上書き不可。security update job が
  # `security_update_not_possible` で失敗するため ignore で抑止する。
  # cdktf が同梱依存を更新するまでアップストリーム側の対応待ち。
  #
  # `dependency-name` 単独指定だと security update job 側で
  # `ignore-conditions` に伝播せず失敗するケース (run #26548981924) を観測したため、
  # `versions: ['>= 0']` を明示してすべてのバージョンを対象に ignore する。
  - package-ecosystem: 'npm'
    directory: '/infra'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'infra'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      - dependency-name: 'minimatch'
        versions: ['>= 0']
      - dependency-name: 'glob'
        versions: ['>= 0']
      - dependency-name: 'lodash'
        versions: ['>= 0']
      - dependency-name: 'brace-expansion'
        versions: ['>= 0']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    # 本番デプロイ経路 (id-token: write / CLOUDFLARE_API_TOKEN を扱う) で利用する
    # Action の semver-major アップグレードは破壊的変更検証が必須なため、Dependabot
    # の自動 PR 対象外にして手動で別 PR 化する。minor / patch / SHA 追従は引き続き
    # 自動 PR で受け取る。
    ignore:
      - dependency-name: 'cloudflare/wrangler-action'
        update-types: ['version-update:semver-major']
      - dependency-name: 'docker/build-push-action'
        update-types: ['version-update:semver-major']
      - dependency-name: 'docker/setup-buildx-action'
        update-types: ['version-update:semver-major']
      - dependency-name: 'dorny/paths-filter'
        update-types: ['version-update:semver-major']
      - dependency-name: 'google-github-actions/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'oven-sh/setup-bun'
        update-types: ['version-update:semver-major']

  # Docker base image (backend)
  - package-ecosystem: 'docker'
    directory: '/backend'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      - dependency-name: 'node'
        versions: ['23.x', '25.x', '27.x', '29.x']

  # Docker base image (frontend)
  - package-ecosystem: 'docker'
    directory: '/frontend'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      - dependency-name: 'node'
        versions: ['23.x', '25.x', '27.x', '29.x']

  # Docker base image (backup)
  - package-ecosystem: 'docker'
    directory: '/backup'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
