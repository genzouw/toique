# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Backend Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    groups:
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript:
        patterns:
          - 'typescript'
          - 'tsx'
          - '@types/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
      hono:
        patterns:
          - 'hono'
          - '@hono/*'
    allow:
      - dependency-type: 'all'

  # Frontend Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    groups:
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
          - '@types/jsdom'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-router'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tw-animate-css'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vite-plugin-*'
    allow:
      - dependency-type: 'all'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'

  # Docker base image (backend)
  - package-ecosystem: 'docker'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      - dependency-name: 'node'
        versions: ['23.x', '25.x', '27.x', '29.x']

  # Docker base image (frontend)
  - package-ecosystem: 'docker'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      - dependency-name: 'node'
        versions: ['23.x', '25.x', '27.x', '29.x']

  # Docker base image (backup)
  - package-ecosystem: 'docker'
    directory: '/backup'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    target-branch: 'main'
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
