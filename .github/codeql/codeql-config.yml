name: 'Toique CodeQL Config'

# 既定のクエリスイート (default) はそのまま利用しつつ、本リポジトリ固有の事情で
# 抑制すべきルールを query-filters で除外する。
#
# js/insufficient-password-hash:
#   `backend/src/middleware/auth.ts` の運営者 Basic 認証で使われている SHA-256
#   は、`createHash('sha256').update(val).digest()` の出力を `timingSafeEqual` に
#   渡すための「長さ正規化」目的であり、永続ストレージ上に保管されるパスワード
#   ハッシュではない。ADMIN_USERNAME / ADMIN_PASSWORD は GCP Secret Manager から
#   平文で供給される運用で、レインボーテーブル攻撃の対象となる「保存ハッシュ」は
#   そもそも存在しない。よって本ルールが想定する slow hash (scrypt / argon2) の
#   要件は適用されず、CodeQL の検出は false positive と判断する。
#   再発防止のため、CodeQL 側で当該ルール ID を suppress する。
query-filters:
  - exclude:
      id: js/insufficient-password-hash
