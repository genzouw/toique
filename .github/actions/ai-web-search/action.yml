name: 'AI Web Search (RAG Prep)'
description: 'Performs web search using Tavily API (if available) or DuckDuckGo for RAG context in AI workflows.'
inputs:
  search_query:
    description: 'The search query to execute.'
    required: true
  tavily_api_key:
    description: 'The Tavily API Key (optional). If not provided, DuckDuckGo is used.'
    required: false
    default: ''
  max_results:
    description: 'Maximum number of search results to return.'
    required: false
    default: '5'
outputs:
  search_results:
    description: 'The formatted search results.'
    value: ${{ steps.search_web.outputs.search_results }}
runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
    - name: Install Search Dependencies
      run: uv pip install --system "duckduckgo-search>=8.1.1" "tavily-python>=0.7.26" "googlesearch-python>=1.3.0" "wikipedia>=1.4.0"
      shell: bash
    - name: Search via Tavily or DuckDuckGo
      id: search_web
      env:
        SEARCH_QUERY: ${{ inputs.search_query }}
        TAVILY_API_KEY: ${{ inputs.tavily_api_key }}
        MAX_RESULTS: ${{ inputs.max_results }}
      run: |
        import os
        import base64
        import time
        query = os.environ.get('SEARCH_QUERY', '')
        tavily_key = os.environ.get('TAVILY_API_KEY', '').strip()
        max_results = int(os.environ.get('MAX_RESULTS', '5'))
        search_res = ""
        if tavily_key:
            print(f"Using Tavily API for search query: {query}")
            try:
                from tavily import TavilyClient
                tavily_client = TavilyClient(api_key=tavily_key)
                response = tavily_client.search(query=query, search_depth="basic", max_results=max_results)
                results = response.get('results', [])
                if results:
                    search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('url')}\nSnippet: {r.get('content')}" for r in results])
                else:
                    print("Tavily returned no results. Falling back to DuckDuckGo...")
            except Exception as e:
                print(f"Tavily search failed: {e}. Falling back to DuckDuckGo...")
        if not search_res:
            print(f"Using DuckDuckGo for search query: {query}")
            from duckduckgo_search import DDGS
            ddg_success = False
            try:
                with DDGS() as ddgs:
                    for _ in range(3):
                        try:
                            results = list(ddgs.text(query, max_results=max_results))
                            if results:
                                search_res = "\n\n".join([f"Title: {r.get('title')}\nURL: {r.get('href')}\nSnippet: {r.get('body')}" for r in results])
                                ddg_success = True
                            break
                        except Exception:
                            time.sleep(2)
                            continue
            except Exception as e:
                print(f"DuckDuckGo search failed: {e}. Falling back to Google Search...")
            if not ddg_success:
                print(f"Using Google Search for query: {query}")
                try:
                    from googlesearch import search as gsearch
                    # googlesearch-python returns a generator of urls or objects if advanced=True
                    # using advanced=True gets title, url, description
                    g_results = list(gsearch(query, num_results=max_results, advanced=True))
                    if g_results:
                        search_res = "\n\n".join([f"Title: {r.title}\nURL: {r.url}\nSnippet: {r.description}" for r in g_results])
                except Exception as e:
                    search_res = f"Web search failed across all providers: {e}"

        # Wikipedia API integration for factual knowledge lookup
        if query.strip():
            try:
                import wikipedia
                wikipedia.set_lang("ja")
                wiki_results = wikipedia.search(query, results=1)
                if wiki_results:
                    page = wikipedia.page(wiki_results[0])
                    wiki_text = f"\n\n--- Wikipedia Info ---\nTitle: {page.title}\nURL: {page.url}\nSummary: {page.summary[:500]}..."
                    search_res += wiki_text
                    print("Appended Wikipedia factual information.")
            except Exception as e:
                print(f"Wikipedia search failed or not found: {e}")

        if not search_res:
            search_res = "No relevant Web search results found."
        delimiter = base64.b64encode(os.urandom(15)).decode('utf-8')
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"search_results<<{delimiter}\n")
            f.write(f"{search_res}\n")
            f.write(f"{delimiter}\n")
      shell: python
