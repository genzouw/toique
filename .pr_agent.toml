[config]
model="gpt-4o"
model_weak="gpt-4o-mini"

[pr_reviewer]
require_tests_review = true
require_score = true
extra_instructions = """
変更がプロジェクト全体に与える影響や、アーキテクチャの観点など、広いスコープからコードレビューを行ってください。必ず日本語でコメントしてください。
メインブランチにマージされた場合に Cloud Run / Cloudflare Pages 上の本番環境にデプロイされることを考慮し、以下の観点を強調し、重要視して必ずレビューに盛り込んでください:
- 実行環境へのアクセス方法（認証情報、API キー、DB 接続文字列、内部 URL など）がコードやログから漏洩していないこと（特に GCP Secret Manager などの適切なシークレット管理が利用されているか）。
- 実行環境に不正にアクセスするための攻撃手法や脆弱性（インジェクション、認可不足、不適切な権限設定、CORS / CSRF / Secure Cookie / Secure Headers の設定崩れなど）が入り込んでいないこと。
- AIエージェントへのプロンプトインジェクションや、LLMに入力される外部コンテキストのサニタイズ漏れなど、生成AI活用特有の脆弱性がないこと。
- パフォーマンスの観点（O(N)ループの回避、N+1問題の防止、不要なDBクエリの削減など）や、アクセシビリティの観点（ボタン等のアクション要素における具体的な対象を含んだ aria-label や title の付与、role="tablist" におけるキーボードナビゲーションや roving tabIndex のサポートなど）が考慮されていること。
- 重要なロジックの変更や新機能追加に対して、適切なテスト（ユニットテストやE2Eテスト等）が追加されており、テストカバレッジが維持または向上していること。テストが不足している場合は、厳しく指摘してください。
- パフォーマンスのため、副作用を伴うループ処理に.map()を使用している場合はfor...ofや.forEach()への変更を促し、アクセシビリティのため装飾アイコンにはaria-hidden="true"を付与することを前提としてレビューを行ってください。デバッグ用のconsole.logが本番コードに残留していないか確認してください。
"""

[pr_description]
extra_instructions = "PRの要約や説明はすべて日本語で記述してください。"

[pr_code_suggestions]
extra_instructions = "可能であれば、具体的な修正コードの提案（スニペット）を含めてください。"
