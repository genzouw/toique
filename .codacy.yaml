---
# Codacy configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# 本プロジェクトのフロントエンドは ESLint + Prettier を採用しており、Biome は
# 導入していない。Codacy がデフォルトで有効化している Biome 解析は二重解析と
# なるだけでなく、`noReactSpecificProps` のようなルールが React プロジェクトの
# `className` 属性を誤検知し、Quality Gate を恒常的に fail させる原因となる。
#
# Codacy の設定ファイルではツール自体の enable/disable は切り替えられない
# (Code patterns UI 経由のみ) ため、Biome に対してすべてのファイルを
# exclude_paths で除外することで実質的に無効化する。
engines:
  biome:
    exclude_paths:
      - '**'
  # TSLint は公式に廃止された ESLint 以前の TypeScript 用 lint で、本プロジェクト
  # では採用していない。Codacy が default 有効化している TSLint は ES5 ターゲット
  # 前提の警告 (ES2015 modules forbidden / block-scoped variables forbidden /
  # for-of forbidden 等) を大量に発生させ Quality Gate を恒常的に fail させる。
  # 本プロジェクトは ESLint + typescript-eslint で型・構文を一貫してカバーして
  # いるため、TSLint の解析は不要として全ファイルを除外する。
  tslint:
    exclude_paths:
      - '**'
  # JSHint も同様に旧来の JavaScript 向け lint で、ES5 既定で動作するため
  # TypeScript / モダン ES module 構成の本プロジェクトでは誤検知の温床となる。
  # ESLint が既に網羅しているため JSHint は無効化する。
  jshint:
    exclude_paths:
      - '**'
