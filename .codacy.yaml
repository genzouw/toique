---
# Codacy configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# 本プロジェクトのフロントエンドは ESLint + Prettier を採用しており、Biome は
# 導入していない。Codacy がデフォルトで有効化している Biome 解析は二重解析と
# なるだけでなく、`noReactSpecificProps` のようなルールが React プロジェクトの
# `className` 属性を誤検知し、Quality Gate を恒常的に fail させる原因となる。
#
# Codacy の設定ファイルではツール自体の enable/disable は切り替えられない
# (Code patterns UI 経由のみ) ため、Biome に対してすべてのファイルを
# exclude_paths で除外することで実質的に無効化する。
engines:
  biome:
    exclude_paths:
      - '**'
  # Codacy がデフォルトで有効化している以下の lint 系 engine は、本プロジェクト
  # (ESLint + typescript-eslint で型・構文を一貫してカバー) と方針が衝突し、
  # ES5 ターゲット前提の誤検知 (ES2015 modules forbidden / block-scoped variables
  # forbidden / for-of forbidden / await in loop 等) を大量に発生させ
  # Quality Gate を恒常的に fail させていた。
  #
  # 本プロジェクト側で ESLint (eslint-9) を別途設定済みなので、レガシー engine は
  # 一括して全ファイルから除外する。
  tslint:
    exclude_paths:
      - '**'
  jshint:
    exclude_paths:
      - '**'
  eslint:
    exclude_paths:
      - '**'
  jshint-7:
    exclude_paths:
      - '**'
  eslint-8:
    exclude_paths:
      - '**'
