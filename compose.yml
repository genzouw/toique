services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: toique
      POSTGRES_PASSWORD: toique
      POSTGRES_DB: toique
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toique']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://toique:toique@db:5432/toique
      PORT: '3000'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: toique
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toique}
      POSTGRES_DB: toique
      POSTGRES_PORT: 5432
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-""}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-""}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-1}
      S3_BUCKET: ${S3_BUCKET:-""}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-"0 3 * * *"}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
