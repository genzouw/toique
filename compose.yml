services:
  db:
    image: public.ecr.aws/docker/library/postgres:17-alpine
    environment:
      POSTGRES_USER: toique
      POSTGRES_PASSWORD: toique
      POSTGRES_DB: toique
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toique']
      interval: 5s
      timeout: 3s
      retries: 5

  # ローカル開発用 SMTP サーバ (受信専用) + Web UI でメール内容を確認
  # Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # 起動時に drizzle のマイグレーションを適用して終了するワンショットサービス。
  # backend は service_completed_successfully を待つので初回起動でも users 等のテーブルが揃った状態で立ち上がる。
  # 本番デプロイでは .github/workflows/deploy.yml が Cloud Run へのデプロイ前に migrate を流すため、このサービスはローカル限定。
  migrate:
    image: toique-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: ['npm', 'run', 'db:migrate']
    environment:
      DATABASE_URL: postgresql://toique:toique@db:5432/toique
      DRIZZLE_MIGRATIONS_DIR: /migrations
    volumes:
      - ./db/migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  backend:
    image: toique-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://toique:toique@db:5432/toique
      PORT: '3000'
      # dev コンテナ内にマウントした migrations を指す
      DRIZZLE_MIGRATIONS_DIR: /migrations
      # ローカル開発用のダミー値 (Stripe API を実際には叩かない)。
      # 実キーで検証する場合は .env 等で上書きしてください。
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-price_dummy}
      # 運営者エリアを使う場合はここに自分のメールを入れる
      OPERATOR_EMAILS: ${OPERATOR_EMAILS:-}
      # /admin 向け Basic 認証の固定 ID/パスワード (ローカル開発用)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # メール送信設定:
      #   ローカル開発では Mailpit (SMTP) に流す。Web UI: http://localhost:8025
      #   RESEND_API_KEY を渡すと Resend に切り替わる (本番想定)
      MAIL_DRIVER: ${MAIL_DRIVER:-smtp}
      MAIL_FROM: ${MAIL_FROM:-noreply@toique.local}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # 旧名 (notify-contact 用)。MAIL_FROM 未指定時のフォールバック
      CONTACT_FROM: ${CONTACT_FROM:-}
    volumes:
      - ./backend/src:/app/src
      - ./db/migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

  # ローカル開発用バックアップ（手動実行: docker compose run --rm backup）
  # 本番環境では Cloud Run Jobs + Cloud Scheduler で定期実行されます
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: toique
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toique}
      POSTGRES_DB: toique
      POSTGRES_PORT: 5432
      GCS_BUCKET: ${GCS_BUCKET:-""}
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${CLOUDSDK_CONFIG:-${HOME}/.config/gcloud}/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup

volumes:
  pgdata:
