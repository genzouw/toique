<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toique - LINEからの問い合わせを対話フォームで自動収集</title>
    <meta
      name="description"
      content="ToiqueはLINE公式アカウントと連携し、対話形式のフォームでお客様の情報を自動で収集・管理するツールです。ノーコードでフォーム作成、回答データのCSVエクスポートに対応。"
    />
    <meta
      name="keywords"
      content="LINE,問い合わせ,フォーム,自動応答,LINE公式アカウント,顧客管理,ノーコード"
    />
    <link rel="canonical" href="__SITE_ORIGIN__/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!--
      JS を実行しないクローラー (Twitter Card / Facebook OG / LINE / Slack 等) 向けのフォールバック。
      CSR-only のため、これらのクローラーは React 19 が動的に挿入する meta を見られない。
      個別ページの正しい OGP は React 側 <SEOMetadata> が JSX で出力し、JS 実行可能なクローラー
      (Google bot 等) およびブラウザ表示はそちらが採用される。SSG/SSR を導入するまでの暫定対応。
    -->
    <meta
      property="og:title"
      content="Toique - LINEからの問い合わせを対話フォームで自動収集"
    />
    <meta
      property="og:description"
      content="LINE公式アカウントと連携し、対話形式のフォームでお客様の情報を自動で収集・管理するツールです。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_ORIGIN__/" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:site_name" content="Toique" />
    <meta property="og:image" content="__SITE_ORIGIN__/ogp.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Toique - LINEからの問い合わせを対話フォームで自動収集"
    />
    <meta
      name="twitter:description"
      content="LINE公式アカウントと連携し、対話形式のフォームでお客様の情報を自動で収集・管理するツールです。"
    />
    <meta name="twitter:image" content="__SITE_ORIGIN__/ogp.png" />
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
