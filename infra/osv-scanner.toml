# OSV-Scanner 設定ファイル
#
# 検出された脆弱性のうち、即時対応が難しい transitive dependency を期限付きで許容する。
# 期限到来後は再評価し、依存パッケージのアップデート可否を確認すること。
#
# 参考: https://google.github.io/osv-scanner/configuration/

# brace-expansion 2.0.1 (cdktf -> archiver 経由) — GHSA-f886-m6hf-6m8v, GHSA-v6h2-p8h4-qcjw (ReDoS)
[[PackageOverrides]]
name = "brace-expansion"
version = "2.0.1"
ecosystem = "npm"
vulnerability.ignore = true
reason = "cdktf -> archiver の transitive dependency。直接の dependency 更新では解消できないため、cdktf 側の対応待ち。2026-12-12 に再評価すること。"

# glob 10.4.5 (cdktf -> archiver -> archiver-utils 経由) — GHSA-5j98-mcp5-4vw2 (ReDoS)
[[PackageOverrides]]
name = "glob"
version = "10.4.5"
ecosystem = "npm"
vulnerability.ignore = true
reason = "cdktf -> archiver -> archiver-utils の transitive dependency。直接の dependency 更新では解消できないため、cdktf 側の対応待ち。2026-12-12 に再評価すること。"

